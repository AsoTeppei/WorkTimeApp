// ===================== マスターデータ =====================
const DEPARTMENTS_DEFAULT = ['営業グループ','設計グループ','高温グループ','電気グループ','製造グループ','ソフトグループ'];
const WORK_CONTENTS_DEFAULT = {
  '営業グループ': ['見積り','客先対応','マーケティング'],
  '設計グループ': ['構想設計','詳細設計','図面作成','設計レビュー','手配'],
  '高温グループ': ['熱計算','炉内テスト','データ解析','レポート作成'],
  '電気グループ': ['回路設計','配線作業','盤チェック','PLCソフト作成','現地調整'],
  '製造グループ': ['部品加工','組立作業','溶接','出荷検査','梱包'],
  'ソフトグループ': ['要件定義','基本設計','コーディング','単体テスト','総合テスト','デバッグ'],
};
const DEPT_COLORS = {
  '営業グループ': 'bg-sky-100 text-sky-700',
  '設計グループ': 'bg-violet-100 text-violet-700',
  '高温グループ': 'bg-orange-100 text-orange-700',
  '電気グループ': 'bg-blue-100 text-blue-700',
  '製造グループ': 'bg-green-100 text-green-700',
  'ソフトグループ': 'bg-pink-100 text-pink-700',
};
const DEFAULT_DEPT_COLOR = 'bg-slate-100 text-slate-700';
const getDeptColor = (d) => DEPT_COLORS[d] || DEFAULT_DEPT_COLOR;

// ===================== ユーティリティ =====================
const today = () => new Date().toISOString().split('T')[0];
const fmtDate = d => d ? d.replace(/-/g,'/') : '';
const DOW_JP = ['日','月','火','水','木','金','土'];
const fmtDateDow = d => {
  if (!d) return '';
  // d は "YYYY-MM-DD" 想定。タイムゾーンずれを避けるためローカル日時で生成
  const [y,m,day] = d.split('-').map(Number);
  if (!y || !m || !day) return fmtDate(d);
  const dow = DOW_JP[new Date(y, m-1, day).getDay()];
  return `${y}/${String(m).padStart(2,'0')}/${String(day).padStart(2,'0')}(${dow})`;
};
const fmtH = h => `${Number(h).toFixed(1)}h`;
const ym = d => d ? d.substring(0,7) : '';
// 日付を N 日ずらす（YYYY-MM-DD 文字列で受け取り・返す）
const shiftDate = (d, days) => {
  const base = d ? d : today();
  const [y, m, day] = base.split('-').map(Number);
  const dt = new Date(y, m-1, day);
  dt.setDate(dt.getDate() + days);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
};
// "YYYY-MM" → "YYYY年M月"
const ymJP = m => {
  if (!m) return '';
  const [y, mo] = m.split('-').map(Number);
  if (!y || !mo) return m;
  return `${y}年${mo}月`;
};

// ---------- 会計年度（期）: 弊社は 9月 - 翌8月 ----------
// 第46期 = 2025-09-01 〜 2026-08-31 を基準点として前後計算する。
const FISCAL_ANCHOR_NUM  = 46;
const FISCAL_ANCHOR_YEAR = 2025; // この年の 9 月から第46期が始まる

// 期番号（"YYYY-MM-DD" or Date or "YYYY-MM" を受け付ける）
const getFiscalYear = (d) => {
  if (!d) d = today();
  let y, m;
  if (d instanceof Date) { y = d.getFullYear(); m = d.getMonth() + 1; }
  else {
    const parts = String(d).split('-').map(Number);
    y = parts[0]; m = parts[1] || 1;
  }
  // 9〜12月 は (年 - ANCHOR_YEAR) 期ぶん進んでいる。1〜8月 は (年-1-ANCHOR_YEAR)。
  const startYear = m >= 9 ? y : y - 1;
  return FISCAL_ANCHOR_NUM + (startYear - FISCAL_ANCHOR_YEAR);
};
// 前期(9〜2月) / 後期(3〜8月)
const getFiscalHalf = (d) => {
  if (!d) d = today();
  let m;
  if (d instanceof Date) m = d.getMonth() + 1;
  else m = Number(String(d).split('-')[1] || 1);
  if (m >= 9 || m <= 2) return 'H1'; // 前期
  return 'H2';                        // 後期
};
// "46期前期" / "46期後期"
const fiscalLabel = (d) => {
  const fy = getFiscalYear(d);
  const half = getFiscalHalf(d);
  return `${fy}期${half === 'H1' ? '前期' : '後期'}`;
};
// 期 + 半期 → [from, to]（YYYY-MM-DD 文字列）
const fiscalHalfRange = (fy, half) => {
  // 期 fy の開始年 = FISCAL_ANCHOR_YEAR + (fy - FISCAL_ANCHOR_NUM)
  const startYear = FISCAL_ANCHOR_YEAR + (fy - FISCAL_ANCHOR_NUM);
  if (half === 'H1') {
    // 9月1日 〜 翌2月末日
    const from = `${startYear}-09-01`;
    const toDate = new Date(startYear + 1, 2, 0); // 翌年3月0日 = 2月末
    const to = `${toDate.getFullYear()}-${String(toDate.getMonth()+1).padStart(2,'0')}-${String(toDate.getDate()).padStart(2,'0')}`;
    return [from, to];
  } else {
    // 3月1日 〜 8月31日
    const from = `${startYear + 1}-03-01`;
    const to   = `${startYear + 1}-08-31`;
    return [from, to];
  }
};
// 期全体（9月1日 〜 翌年8月31日）
const fiscalYearRange = (fy) => {
  const startYear = FISCAL_ANCHOR_YEAR + (fy - FISCAL_ANCHOR_NUM);
  return [`${startYear}-09-01`, `${startYear + 1}-08-31`];
};

function downloadCSV(content, filename) {
  const blob = new Blob(['\uFEFF' + content], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

const findTarget = (targets, userId, projectNo) =>
  targets.find(t => Number(t.userId) === Number(userId) && t.projectNo === projectNo);

// ===================== ユーザー設定の永続化（localStorage） =====================
// キーは "worktime.prefs.v1.<name>"。破損時は黙って無視してデフォルトを使う。
const PREFS_PREFIX = 'worktime.prefs.v1.';

const loadPref = (name, fallback) => {
  try {
    const raw = localStorage.getItem(PREFS_PREFIX + name);
    if (raw == null) return fallback;
    return JSON.parse(raw);
  } catch (e) {
    return fallback;
  }
};

const savePref = (name, value) => {
  try {
    localStorage.setItem(PREFS_PREFIX + name, JSON.stringify(value));
  } catch (e) { /* ignore quota/security errors */ }
};

const clearPref = (name) => {
  try { localStorage.removeItem(PREFS_PREFIX + name); } catch (e) {}
};

// state を localStorage に自動保存する useState ラッパー
function usePersistedState(name, fallback) {
  const [state, setState] = useState(() => {
    const loaded = loadPref(name, undefined);
    return loaded === undefined ? fallback : loaded;
  });
  useEffect(() => {
    savePref(name, state);
  }, [name, state]);
  return [state, setState];
}

// ===================== 認証（トークン）永続化 =====================
const AUTH_STORAGE_KEY = 'worktime.auth.v1';
const loadAuth = () => {
  try {
    const raw = localStorage.getItem(AUTH_STORAGE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || !obj.token || !obj.user) return null;
    return obj;
  } catch (e) { return null; }
};
const saveAuth = (auth) => {
  try { localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(auth)); } catch (e) {}
};
const clearAuth = () => {
  try { localStorage.removeItem(AUTH_STORAGE_KEY); } catch (e) {}
};
const ROLE_LABEL = { admin: '管理者', leader: 'リーダー', member: 'メンバー' };
const ROLE_COLOR = { admin: 'bg-red-100 text-red-700', leader: 'bg-amber-100 text-amber-700', member: 'bg-slate-100 text-slate-600' };

// ===================== ログイン画面 =====================
function LoginScreen({ apiUrl, onLoggedIn, onApiUrlChange }) {
  const [users, setUsers]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState('');
  const [selectedUserId, setSelectedUserId] = useState('');
  const [pin, setPin]           = useState('');
  const [pin2, setPin2]         = useState('');
  const [mode, setMode]         = useState('login'); // 'login' | 'setup'
  const [submitting, setSubmitting] = useState(false);
  const [apiInput, setApiInput] = useState(apiUrl);

  const fetchUsers = async (url) => {
    setLoading(true);
    setError('');
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 5000);
      const res = await fetch(`${url}/auth/users`, { signal: ctrl.signal });
      clearTimeout(tid);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      setUsers(data || []);
    } catch (e) {
      setError(e.name === 'AbortError' ? 'タイムアウト: サーバーに接続できません' : `サーバーに接続できません (${e.message})`);
      setUsers([]);
    } finally { setLoading(false); }
  };

  useEffect(() => { fetchUsers(apiUrl); }, [apiUrl]);

  // 選択中ユーザーが PIN 未設定なら setup モードに切替
  useEffect(() => {
    const u = users.find(x => String(x.id) === String(selectedUserId));
    if (u && !u.hasPin) setMode('setup'); else setMode('login');
    setPin(''); setPin2('');
  }, [selectedUserId, users]);

  const selectedUser = users.find(x => String(x.id) === String(selectedUserId));

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!selectedUserId) return;
    if (!/^\d{4}$/.test(pin)) { setError('PINは4桁の数字で入力してください'); return; }
    if (mode === 'setup' && pin !== pin2) { setError('確認用PINが一致しません'); return; }
    setSubmitting(true);
    setError('');
    try {
      const path = mode === 'setup' ? '/auth/setup-pin' : '/auth/login';
      const res = await fetch(`${apiUrl}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: Number(selectedUserId), pin })
      });
      const data = await res.json();
      if (!res.ok) { setError(data.error || `HTTP ${res.status}`); setSubmitting(false); return; }
      // 既に PIN 設定済みだが setup で叩いてしまった場合などのフォールバック
      if (data.needsSetup) { setMode('setup'); setSubmitting(false); return; }
      if (!data.token || !data.user) { setError('レスポンスが不正です'); setSubmitting(false); return; }
      saveAuth({ token: data.token, user: data.user });
      onLoggedIn({ token: data.token, user: data.user });
    } catch (err) {
      setError(`通信エラー: ${err.message}`);
      setSubmitting(false);
    }
  };

  // 部署ごとにグルーピング
  const grouped = useMemo(() => {
    const map = {};
    users.forEach(u => {
      if (!map[u.department]) map[u.department] = [];
      map[u.department].push(u);
    });
    return Object.entries(map);
  }, [users]);

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 to-blue-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full border-t-8 border-blue-600 p-8 space-y-6">
        <div className="text-center space-y-2">
          <div className="inline-flex w-14 h-14 bg-blue-100 rounded-2xl items-center justify-center mx-auto">
            <ILock s={28} c="text-blue-700"/>
          </div>
          <h1 className="text-xl font-black text-slate-800">作業時間 一元管理システム</h1>
          <p className="text-xs text-slate-500">担当者を選択してPINでログインしてください</p>
        </div>

        {loading ? (
          <div className="py-10 text-center">
            <IRefresh s={28} c="animate-spin text-blue-600 mx-auto"/>
            <p className="text-xs text-slate-500 mt-3">サーバーに接続中...</p>
          </div>
        ) : error && users.length === 0 ? (
          <div className="space-y-4">
            <div className="bg-red-50 border border-red-200 text-red-700 text-xs font-bold rounded-xl p-3">{error}</div>
            <div className="space-y-2">
              <label className="text-xs font-bold text-slate-500">接続先URL</label>
              <div className="flex gap-2">
                <input value={apiInput} onChange={e=>setApiInput(e.target.value)} className="flex-1 border-2 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-400"/>
                <button onClick={()=>{ onApiUrlChange(apiInput); fetchUsers(apiInput); }}
                  className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700">再接続</button>
              </div>
            </div>
          </div>
        ) : (
          <form onSubmit={handleSubmit} className="space-y-5">
            <div className="space-y-1.5">
              <label className="text-xs font-black text-slate-600 uppercase tracking-wider">担当者 *</label>
              <select required value={selectedUserId} onChange={e=>setSelectedUserId(e.target.value)}
                className="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none">
                <option value="">— 選択してください —</option>
                {grouped.map(([dept, list]) => (
                  <optgroup key={dept} label={dept}>
                    {list.map(u => (
                      <option key={u.id} value={u.id}>{u.name}{u.hasPin ? '' : '（初回：PIN未設定）'}</option>
                    ))}
                  </optgroup>
                ))}
              </select>
              {selectedUser && (
                <span className={`inline-block text-[10px] font-bold px-2 py-0.5 rounded-full ${getDeptColor(selectedUser.department)}`}>{selectedUser.department}</span>
              )}
            </div>

            {selectedUser && (
              <>
                {mode === 'setup' && (
                  <div className="bg-amber-50 border border-amber-200 text-amber-800 text-[11px] font-bold rounded-xl p-3">
                    初回ログインです。4桁の PIN を設定してください。（以降は同じ PIN でログインします）
                  </div>
                )}
                <div className="space-y-1.5">
                  <label className="text-xs font-black text-slate-600 uppercase tracking-wider">
                    {mode === 'setup' ? '新しい PIN（4桁）*' : 'PIN（4桁）*'}
                  </label>
                  <input
                    type="password"
                    inputMode="numeric"
                    pattern="\d{4}"
                    maxLength={4}
                    autoFocus
                    required
                    value={pin}
                    onChange={e=>setPin(e.target.value.replace(/\D/g,'').slice(0,4))}
                    className="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-lg font-mono tracking-[0.5em] text-center focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none"
                    placeholder="••••"
                  />
                </div>
                {mode === 'setup' && (
                  <div className="space-y-1.5">
                    <label className="text-xs font-black text-slate-600 uppercase tracking-wider">PIN 確認（再入力）*</label>
                    <input
                      type="password"
                      inputMode="numeric"
                      pattern="\d{4}"
                      maxLength={4}
                      required
                      value={pin2}
                      onChange={e=>setPin2(e.target.value.replace(/\D/g,'').slice(0,4))}
                      className="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-lg font-mono tracking-[0.5em] text-center focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none"
                      placeholder="••••"
                    />
                  </div>
                )}
              </>
            )}

            {error && <div className="bg-red-50 border border-red-200 text-red-700 text-xs font-bold rounded-xl p-3">{error}</div>}

            <button type="submit" disabled={submitting || !selectedUserId || pin.length !== 4 || (mode==='setup' && pin2.length !== 4)}
              className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white py-3 rounded-xl text-sm font-black transition-colors flex items-center justify-center gap-2">
              {submitting ? <IRefresh s={16} c="animate-spin"/> : <ILock s={16}/>}
              {mode === 'setup' ? 'PIN を設定してログイン' : 'ログイン'}
            </button>
          </form>
        )}

        <div className="pt-4 border-t border-slate-100">
          <details className="text-[10px] text-slate-400">
            <summary className="cursor-pointer hover:text-slate-600">接続先URLを変更</summary>
            <div className="flex gap-2 mt-2">
              <input value={apiInput} onChange={e=>setApiInput(e.target.value)} className="flex-1 border rounded px-2 py-1 text-[10px]"/>
              <button type="button" onClick={()=>{ onApiUrlChange(apiInput); fetchUsers(apiInput); }}
                className="bg-slate-200 px-2 rounded text-[10px] font-bold hover:bg-slate-300">適用</button>
            </div>
          </details>
        </div>
      </div>
    </div>
  );
}

// ===================== メインアプリ =====================
function App() {
  const [activeTab, setActiveTab] = useState('home');
  // 入力画面へ遷移する際に「この日付を初期値にしたい」というリクエストを
  // 一時的に保持するための state。
  //   - ホーム画面の入力忘れパネルから「今すぐ入力」やチップクリックで遷移
  //     するときに使う。
  //   - InputScreen がマウント時に 1 回だけ読み取り、即座に null にクリアする
  //     （useEffect + onPresetDateConsumed）ので、通常のタブ切替では影響しない。
  const [pendingInputDate, setPendingInputDate] = useState(null);

  // 画面遷移ヘルパー。第2引数で { date } を渡すと、入力画面のマウント時に
  // その日付を初期値として適用する。date を省略すれば通常のタブ切替と同じ。
  const navigate = (tabId, options = {}) => {
    if (tabId === 'input' && options.date) {
      setPendingInputDate(options.date);
    }
    setActiveTab(tabId);
  };
  const [users, setUsers]         = useState([]);
  const [projects, setProjects]   = useState([]);
  const [logs, setLogs]           = useState([]);
  const [targets, setTargets]     = useState([]);
  const [depts, setDepts]         = useState(DEPARTMENTS_DEFAULT);
  const [workContents, setWorkContents] = useState(WORK_CONTENTS_DEFAULT);
  const [totalLogs, setTotalLogs] = useState(0);
  const [rangeTotal, setRangeTotal] = useState(0);
  // サーバーから読み込み済みの日付範囲（loadedRange.from 〜 loadedRange.to）
  // 初期は当月のみ。ユーザー操作で過去へ拡張できる。
  const [loadedRange, setLoadedRange] = useState(null);
  const [lastLog, setLastLog]     = useState(null);
  const [notif, setNotif]         = useState({ msg:'', err:false });
  const [isLoading, setIsLoading] = useState(false);
  const [apiError, setApiError]   = useState('');
  const [lastSync, setLastSync]   = useState(null);
  const [apiUrl, setApiUrl]       = useState(() => localStorage.getItem('worktime_api_url') || 'http://192.168.1.8:3000/api');
  const [apiUrlInput, setApiUrlInput] = useState(apiUrl);

  // 認証状態（localStorage から復元）
  const [auth, setAuth] = useState(() => loadAuth());
  const isLoggedIn = !!(auth && auth.token && auth.user);

  const notify = (msg, err=false) => {
    setNotif({ msg, err });
    setTimeout(() => setNotif({ msg:'', err:false }), 3000);
  };

  // ログアウト（トークンを破棄して初期画面に戻す）
  const logout = (msg) => {
    clearAuth();
    setAuth(null);
    setUsers([]); setProjects([]); setLogs([]); setTargets([]);
    setTotalLogs(0); setLastLog(null); setLastSync(null);
    setActiveTab('home');
    if (msg) notify(msg, true);
  };

  // ログイン成功時
  const handleLoggedIn = (a) => {
    setAuth(a);
    // auth 更新後の loadData は useEffect 経由で走る
  };

  // 認証ヘッダ付き fetch
  const authedFetch = async (url, opts = {}) => {
    const token = auth?.token || (loadAuth() || {}).token;
    const headers = { ...(opts.headers || {}) };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(url, { ...opts, headers });
    if (res.status === 401) {
      // セッション無効 → 強制ログアウト
      logout('セッションが無効になりました。再ログインしてください');
      throw new Error('UNAUTHORIZED');
    }
    return res;
  };

  // 当月初日 "YYYY-MM-01"
  const currentMonthStart = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
  };

  // 初期ロード / 範囲変更ロード
  //   silent=true のときは、現在の loadedRange をそのまま使ってバックグラウンド同期するだけ
  //   range={from,to} を渡すと、その範囲でログを読み直す（過去遡及など）
  const loadData = async (url = apiUrl, silent = false, range = null) => {
    if (!auth || !auth.token) return;
    if (!silent) setIsLoading(true);
    setApiError('');
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 10000);

      // 使う範囲を確定
      const effectiveRange = range
        || loadedRange
        || { from: currentMonthStart(), to: today() };
      const q = `?dateFrom=${encodeURIComponent(effectiveRange.from)}&dateTo=${encodeURIComponent(effectiveRange.to)}`;
      const res = await authedFetch(`${url}/init-data${q}`, { signal: ctrl.signal });
      clearTimeout(tid);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      setUsers(data.users || []);
      setProjects(data.projects || []);
      setLogs(data.logs || []);
      setTargets(data.targets || []);
      setTotalLogs(data.totalLogs || (data.logs || []).length);
      setRangeTotal(data.rangeTotal || (data.logs || []).length);
      // サーバーが採用した範囲を正として保存
      if (data.loadedRange) setLoadedRange(data.loadedRange);
      else setLoadedRange(effectiveRange);
      if (data.departments && data.departments.length) setDepts(data.departments);
      if (data.workContents) setWorkContents(data.workContents);
      localStorage.setItem('worktime_api_url', url);
      setApiUrl(url);
      setLastSync(new Date());
    } catch (e) {
      if (e.message === 'UNAUTHORIZED') return;
      if (!silent) setApiError(e.name === 'AbortError' ? 'タイムアウト: サーバーに接続できません。' : `サーバーに接続できません。(${e.message})`);
    } finally { if (!silent) setIsLoading(false); }
  };

  // 過去方向に範囲を広げる（月数指定）
  const expandRange = async (months) => {
    const base = loadedRange || { from: currentMonthStart(), to: today() };
    const [y, m, d] = base.from.split('-').map(Number);
    const newFrom = new Date(y, m - 1 - (months || 1), 1);
    const nf = `${newFrom.getFullYear()}-${String(newFrom.getMonth()+1).padStart(2,'0')}-01`;
    await loadData(apiUrl, false, { from: nf, to: base.to });
  };

  // ログイン後に初期ロード
  useEffect(() => {
    if (isLoggedIn) loadData();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [isLoggedIn]);

  // 30秒ごとにバックグラウンド同期（他ユーザーの入力を自動反映）
  useEffect(() => {
    if (!isLoggedIn) return;
    if (isLoading) return;
    const id = setInterval(() => loadData(apiUrl, true), 30000);
    return () => clearInterval(id);
  }, [isLoggedIn, isLoading, apiUrl]);

  // 追加ログ取得（従来のページネーション — 全期間を連番で追加取得）
  // 現在は loadedRange 方式に移行しているが、ListScreen の「もっと読む」用に残す。
  const loadMoreLogs = async (offset) => {
    try {
      const res = await authedFetch(`${apiUrl}/logs?limit=500&offset=${offset}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      setLogs(prev => [...prev, ...(data.logs || [])]);
      setTotalLogs(data.total || 0);
      notify(`${(data.logs || []).length}件を追加読み込みしました`);
      return true;
    } catch(e) {
      if (e.message !== 'UNAUTHORIZED') notify('通信エラー: ' + e.message, true);
      return false;
    }
  };

  // 指定した日付範囲でログを絞り込んで取得（集計画面から期選択時に使う）
  const fetchLogsByRange = async (from, to, extraParams = {}) => {
    const params = new URLSearchParams({ dateFrom: from, dateTo: to, limit: '5000', offset: '0' });
    for (const [k, v] of Object.entries(extraParams)) {
      if (v != null && v !== '') params.set(k, v);
    }
    const res = await authedFetch(`${apiUrl}/logs?${params.toString()}`);
    if (!res.ok) {
      if (res.status !== 401) notify(`取得エラー: HTTP ${res.status}`, true);
      return null;
    }
    return res.json();
  };

  // 前年同期比較 (YoY)
  const fetchYoY = async (from, to) => {
    const res = await authedFetch(`${apiUrl}/stats/yoy?dateFrom=${encodeURIComponent(from)}&dateTo=${encodeURIComponent(to)}`);
    if (!res.ok) {
      if (res.status !== 401) notify(`YoY取得エラー: HTTP ${res.status}`, true);
      return null;
    }
    return res.json();
  };

  // 自分の直近 N 営業日の入力状況（ホーム画面の「入力忘れ」パネルで使用）
  //   サーバー側で土日祝・会社休業日を除外した営業日だけを返す。
  //   失敗してもホーム画面の他の要素には影響を出さないよう、静かに null を返す。
  const fetchMyInputStatus = async (days = 7) => {
    try {
      const res = await authedFetch(`${apiUrl}/me/input-status?days=${days}`);
      if (!res.ok) return null;
      return await res.json();
    } catch (e) {
      return null;
    }
  };

  const callApi = async (method, path, body) => {
    const res = await authedFetch(`${apiUrl}${path}`, {
      method, headers: { 'Content-Type':'application/json' },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      let code = null;
      try {
        const j = await res.json();
        if (j.error) msg = j.error;
        if (j.code)  code = j.code;
      } catch {}
      const err = new Error(msg);
      err.status = res.status;
      err.code   = code;
      throw err;
    }
    return res.json();
  };

  const handleSaveLog = async (log) => {
    try {
      const data = await callApi('POST', '/logs', log);
      if (data.success) {
        const newLog = { ...log, id: data.logId };
        setLogs(prev => [newLog, ...prev]);
        setLastLog(newLog);
        setTotalLogs(t => t + 1);
        if (log.isNewProject) {
          setProjects(prev => [...prev, { no: log.projectNo, client: log.newClient, subject: log.newSubject, isClosed: false, lastUsed: Date.now() }]);
        } else {
          setProjects(prev => prev.map(p => p.no === log.projectNo ? { ...p, lastUsed: Date.now() } : p));
        }
        if (data.target) {
          setTargets(prev => [...prev, data.target]);
        }
        notify('登録しました');
        return true;
      }
    } catch(e) {
      if (e.code === 'PROJECT_CLOSED') {
        // サーバー側の自動クローズ / 手動クローズで締め切られた注番
        notify('この注番はクロースされています。管理者に解除を依頼してください', true);
        // 画面上も最新のクローズ状態に同期しておく
        setProjects(prev => prev.map(p => p.no === log.projectNo ? { ...p, isClosed: true } : p));
      } else {
        notify('通信エラー: ' + e.message, true);
      }
    }
    return false;
  };

  const handleUpdateLog = async (log) => {
    try {
      const data = await callApi('PUT', `/logs/${log.id}`, log);
      if (data.success) {
        setLogs(prev => prev.map(l => l.id === log.id ? log : l));
        notify('更新しました');
        return true;
      }
    } catch(e) { notify('通信エラー: ' + e.message, true); }
    return false;
  };

  const handleDeleteLog = async (logId) => {
    try {
      const data = await callApi('DELETE', `/logs/${logId}`);
      if (data.success) {
        setLogs(prev => prev.filter(l => l.id !== logId));
        setTotalLogs(t => Math.max(0, t - 1));
        notify('削除しました');
        return true;
      }
    } catch(e) { notify('通信エラー: ' + e.message, true); }
    return false;
  };

  const handleUpdateTarget = async (userId, projectNo, targetHours, reason) => {
    try {
      const data = await callApi('PUT', '/targets', { userId, projectNo, targetHours, reason });
      if (data.success && data.target) {
        setTargets(prev => {
          const exists = prev.some(t => Number(t.userId) === Number(userId) && t.projectNo === projectNo);
          return exists
            ? prev.map(t => (Number(t.userId) === Number(userId) && t.projectNo === projectNo) ? data.target : t)
            : [...prev, data.target];
        });
        notify('目標時間を更新しました');
        return true;
      }
    } catch(e) { notify('通信エラー: ' + e.message, true); }
    return false;
  };

  // 目標時間の変更履歴を取得（leader/admin 用）
  const handleFetchTargetHistory = async (userId, projectNo) => {
    try {
      const res = await authedFetch(`${apiUrl}/targets/${userId}/${encodeURIComponent(projectNo)}/history`);
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { const j = await res.json(); if (j.error) msg = j.error; } catch {}
        throw new Error(msg);
      }
      return await res.json();
    } catch(e) {
      if (e.message !== 'UNAUTHORIZED') notify('履歴取得エラー: ' + e.message, true);
      return null;
    }
  };

  // 管理者による PIN リセット
  const handleResetPin = async (userId) => {
    try {
      const data = await callApi('POST', '/auth/reset-pin', { userId });
      if (data.success) {
        setUsers(prev => prev.map(u => u.id === userId ? { ...u, hasPin: false } : u));
        notify('PIN をリセットしました');
        return true;
      }
    } catch(e) { notify('エラー: ' + e.message, true); }
    return false;
  };

  const handleUpdateProject = async (projectNo, payload) => {
    try {
      const data = await callApi('PUT', `/projects/${encodeURIComponent(projectNo)}`, payload);
      if (data.success) {
        setProjects(prev => prev.map(p => p.no === projectNo
          ? { ...p, client: payload.client, subject: payload.subject, isClosed: !!payload.isClosed }
          : p));
        notify('注番情報を更新しました');
        return true;
      }
    } catch(e) { notify('通信エラー: ' + e.message, true); }
    return false;
  };

  const handleSaveUser = async (user) => {
    try {
      if (user.id) {
        const data = await callApi('PUT', `/users/${user.id}`, user);
        if (data.success) { setUsers(prev => prev.map(u => u.id === user.id ? user : u)); notify('更新しました'); return true; }
      } else {
        const data = await callApi('POST', '/users', user);
        if (data.success) { setUsers(prev => [...prev, { ...user, id: data.userId }]); notify('ユーザーを登録しました'); return true; }
      }
    } catch(e) { notify('通信エラー: ' + e.message, true); }
    return false;
  };

  const handleDeleteUser = async (userId) => {
    try {
      const data = await callApi('DELETE', `/users/${userId}`);
      if (data.success) { setUsers(prev => prev.filter(u => u.id !== userId)); notify('削除しました'); return true; }
    } catch(e) { notify('通信エラー: ' + e.message, true); }
    return false;
  };

  const handleSaveWorkContents = async (dept, items) => {
    try {
      const data = await callApi('PUT', `/work-contents/${encodeURIComponent(dept)}`, { items });
      if (data.success) { setWorkContents(prev => ({ ...prev, [dept]: items })); notify('作業内容を更新しました'); return true; }
    } catch(e) { notify('通信エラー: ' + e.message, true); }
    return false;
  };

  const handleAddDept = async (name) => {
    try {
      const data = await callApi('POST', '/departments', { name });
      if (data.success) {
        setDepts(prev => prev.includes(name) ? prev : [...prev, name]);
        setWorkContents(prev => prev[name] ? prev : { ...prev, [name]: [] });
        notify('グループを登録しました');
        return true;
      }
    } catch(e) { notify('エラー: ' + e.message, true); }
    return false;
  };

  const handleRenameDept = async (oldName, newName) => {
    try {
      const data = await callApi('PUT', `/departments/${encodeURIComponent(oldName)}`, { newName });
      if (data.success) {
        setDepts(prev => prev.map(d => d === oldName ? newName : d));
        setWorkContents(prev => {
          const next = { ...prev };
          next[newName] = next[oldName] || [];
          delete next[oldName];
          return next;
        });
        setUsers(prev => prev.map(u => u.department === oldName ? { ...u, department: newName } : u));
        notify('グループ名を更新しました');
        return true;
      }
    } catch(e) { notify('エラー: ' + e.message, true); }
    return false;
  };

  const handleDeleteDept = async (name) => {
    try {
      const data = await callApi('DELETE', `/departments/${encodeURIComponent(name)}`);
      if (data.success) {
        setDepts(prev => prev.filter(d => d !== name));
        setWorkContents(prev => { const next = { ...prev }; delete next[name]; return next; });
        notify('グループを削除しました');
        return true;
      }
    } catch(e) { notify('エラー: ' + e.message, true); }
    return false;
  };

  // 未ログイン → ログイン画面
  if (!isLoggedIn) {
    return <LoginScreen apiUrl={apiUrl} onLoggedIn={handleLoggedIn} onApiUrlChange={(u)=>{ localStorage.setItem('worktime_api_url', u); setApiUrl(u); }}/>;
  }

  // 初回ロード（まだデータが来ていない）: フルスクリーンスピナー
  //   mid-session の reload（期変更で range を広げるなど）ではこの分岐に
  //   入らず、下の通常ツリーを維持したままオーバーレイだけが出るようにする。
  //   ここで return してしまうと子コンポーネント（AnalysisScreen /
  //   SummaryScreen など）がアンマウントされ、期変更の state 更新が
  //   localStorage に保存される前に失われる。
  if (isLoading && users.length === 0) return (
    <div className="min-h-screen flex items-center justify-center bg-slate-100">
      <div className="text-center space-y-4">
        <IRefresh s={40} c="animate-spin text-blue-600 mx-auto" />
        <p className="font-bold text-blue-900">サーバーに接続中...</p>
        <p className="text-sm text-slate-500">{apiUrl}</p>
      </div>
    </div>
  );

  if (apiError && users.length === 0) return (
    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
      <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full border-t-8 border-red-500 p-8 space-y-6">
        <div className="flex items-center gap-3">
          <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center"><IX s={24} c="text-red-600"/></div>
          <div><h2 className="text-xl font-black text-slate-800">接続できません</h2><p className="text-sm text-red-600">{apiError}</p></div>
        </div>
        <div className="bg-slate-50 rounded-xl p-4 space-y-3">
          <p className="text-xs font-bold text-slate-500">接続先URLを変更して再試行</p>
          <div className="flex gap-2">
            <input value={apiUrlInput} onChange={e=>setApiUrlInput(e.target.value)} className="flex-1 border-2 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-400" placeholder="http://192.168.1.x:3000/api"/>
            <button onClick={()=>loadData(apiUrlInput)} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700">接続</button>
          </div>
        </div>
        <div className="flex justify-end">
          <button onClick={()=>logout()} className="text-xs text-slate-500 hover:text-red-600 underline">ログアウト</button>
        </div>
        <ul className="text-xs text-slate-400 list-disc list-inside space-y-1">
          <li>ホストPCで <code className="bg-slate-100 px-1 rounded">node server.js</code> が起動していますか？</li>
          <li>ファイアウォールでポート3000は許可されていますか？</li>
        </ul>
      </div>
    </div>
  );

  const currentUser = auth.user;
  const isAdmin  = currentUser.role === 'admin';
  const isLeader = currentUser.role === 'leader' || currentUser.role === 'admin';

  // 権限に応じてタブを絞る（settings は admin のみ）
  const navItems = [
    { id:'home',     icon:<IHome s={16}/>,  label:'ホーム' },
    { id:'input',    icon:<IEdit s={16}/>,  label:'入力画面' },
    { id:'analysis', icon:<IChart s={16}/>, label:'データ解析画面' },
    ...(isAdmin ? [{ id:'settings', icon:<ICog s={16}/>, label:'環境設定画面' }] : []),
  ];

  return (
    <div className="min-h-screen flex flex-col">
      {/* ヘッダー */}
      <header className="bg-gradient-to-r from-blue-950 to-blue-800 text-white shadow-lg sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
          <div className="flex items-center gap-3 cursor-pointer" onClick={()=>setActiveTab('home')}>
            <IEdit s={24} c="text-blue-300"/>
            <h1 className="text-base font-black tracking-tight">作業時間 一元管理システム</h1>
          </div>
          <div className="flex items-center gap-3">
            {notif.msg && (
              <div className={`px-5 py-1.5 rounded-full text-sm font-bold shadow-lg fade-in ${notif.err ? 'bg-red-500' : 'bg-emerald-500'}`}>{notif.msg}</div>
            )}
            {apiError && (
              <div className="flex items-center gap-2 text-yellow-300 text-xs font-bold bg-yellow-900/40 px-3 py-1 rounded-full">
                <span>⚠</span><span>接続エラー</span>
              </div>
            )}
            <div className="flex items-center gap-2 bg-blue-900/40 rounded-full pl-3 pr-2 py-1">
              <div className="text-xs font-bold leading-tight text-right">
                <div>{currentUser.name}</div>
                <div className="text-[9px] text-blue-200">{currentUser.department}</div>
              </div>
              <span className={`text-[9px] font-black px-2 py-0.5 rounded-full ${ROLE_COLOR[currentUser.role] || ROLE_COLOR.member}`}>{ROLE_LABEL[currentUser.role] || currentUser.role}</span>
            </div>
            <button onClick={()=>logout()}
              title="ログアウト"
              className="bg-blue-800 hover:bg-red-600 transition-colors rounded-full px-3 py-1.5 flex items-center gap-1.5 text-xs font-bold text-white">
              <IX s={12}/>
              ログアウト
            </button>
          </div>
        </div>
      </header>

      {/* ナビ */}
      <nav className="bg-white border-b border-slate-200 shadow-sm sticky top-14 z-40">
        <div className="max-w-7xl mx-auto px-2 flex overflow-x-auto scrollbar-hide">
          {navItems.map(({ id, icon, label }) => (
            <button key={id} onClick={()=>setActiveTab(id)}
              className={`flex items-center gap-1.5 px-6 py-4 text-sm font-bold whitespace-nowrap transition-all border-b-[3px] ${activeTab===id ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50'}`}>
              {icon}{label}
            </button>
          ))}
        </div>
      </nav>

      {/* メイン */}
      {/* 注意: ここに transform を伴うアニメーション（fade-in など）を付けると
          CSS スタッキングコンテキストが生成され、内部の fixed モーダル（z-50）が
          sticky ヘッダー（z-50）に隠れてしまう。モーダルが正しく前面に出なく
          なるため、main には transform 系のクラスを付けないこと。 */}
      <main className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6">
        {activeTab==='home'     && <HomeScreen  users={users} projects={projects} logs={logs} targets={targets} depts={depts} lastSync={lastSync} onNavigate={navigate} currentUser={currentUser} isAdmin={isAdmin} onFetchMyInputStatus={fetchMyInputStatus}/>}
        {activeTab==='input'    && <InputScreen users={users} projects={projects} logs={logs} workContents={workContents} targets={targets} lastLog={lastLog} onSave={handleSaveLog} currentUser={currentUser} presetDate={pendingInputDate} onPresetDateConsumed={()=>setPendingInputDate(null)}/>}
        {activeTab==='analysis' && <AnalysisScreen logs={logs} users={users} projects={projects} targets={targets} depts={depts} workContents={workContents} totalLogs={totalLogs} rangeTotal={rangeTotal} loadedRange={loadedRange} onExpandRange={expandRange} onFetchLogsByRange={fetchLogsByRange} onFetchYoY={fetchYoY} onUpdate={handleUpdateLog} onDelete={handleDeleteLog} onUpdateTarget={handleUpdateTarget} onLoadMore={loadMoreLogs} currentUser={currentUser} isLeader={isLeader} onFetchTargetHistory={handleFetchTargetHistory}/>}
        {activeTab==='settings' && isAdmin && <SettingsScreen users={users} depts={depts} projects={projects} workContents={workContents} onSaveUser={handleSaveUser} onDeleteUser={handleDeleteUser} onSaveWorkContents={handleSaveWorkContents} onAddDept={handleAddDept} onRenameDept={handleRenameDept} onDeleteDept={handleDeleteDept} onUpdateProject={handleUpdateProject} onResetPin={handleResetPin} currentUser={currentUser}/>}
      </main>

      {/* フッター（同期ステータス） */}
      {lastSync && (
        <footer className="border-t border-slate-200 bg-white py-2 px-4 text-[10px] text-slate-400 text-center">
          最終同期: {lastSync.toLocaleTimeString('ja-JP')}（30秒ごとに自動更新）
        </footer>
      )}

      {/* mid-session ローディングオーバーレイ
          期変更で過去範囲を遡るなど、データ再取得中に画面ツリーを維持したまま
          操作を一時ブロックするためのオーバーレイ。子コンポーネント（特に
          SummaryScreen/AnalysisScreen）をアンマウントしないことで、期選択の
          state が localStorage に書き込まれる前に失われるのを防ぐ。
          フルスクリーンスピナーは初回ロード時のみ（上方で return 済み）。*/}
      {isLoading && users.length > 0 && (
        <div className="fixed inset-0 z-[60] bg-slate-900/20 backdrop-blur-[1px] flex items-center justify-center pointer-events-auto">
          <div className="bg-white rounded-xl shadow-2xl px-6 py-4 flex items-center gap-3 border border-slate-200">
            <IRefresh s={20} c="animate-spin text-blue-600" />
            <span className="text-sm font-bold text-slate-700">データを読み込み中...</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== ホーム: 入力状況パネル =====================
// 自分の直近 7 営業日分の入力状況をドット表示し、
// 未入力日があれば黄色バナーで警告する。
//
//   - 土日・祝日はサーバー側で除外済み（営業日のみ返ってくる）
//   - 今日の入力がまだの場合はグレー（警告ではない）
//   - 過去の営業日に入力が無い場合は黄色（警告）
//   - 日付チップをクリックすると入力画面に遷移する
//   - ホームに来るたびに再取得するので、ログイン長期維持でも鮮度が保てる
function InputStatusPanel({ onFetchMyInputStatus, onNavigate }) {
  const [data, setData]   = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [err, setErr]     = React.useState(null);

  const load = React.useCallback(async () => {
    setLoading(true);
    const result = await onFetchMyInputStatus(7);
    if (!result) {
      setErr('取得に失敗しました');
      setLoading(false);
      return;
    }
    setData(result);
    setErr(null);
    setLoading(false);
  }, [onFetchMyInputStatus]);

  React.useEffect(() => { load(); }, [load]);

  // 読み込み中は高さを潰さないために枠だけ出す
  if (loading && !data) {
    return (
      <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
        <div className="flex items-center gap-2 text-xs text-slate-400">
          <IRefresh s={14} c="animate-spin"/> 入力状況を確認中...
        </div>
      </div>
    );
  }
  if (err || !data) {
    return (
      <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
        <p className="text-xs text-slate-400">入力状況を取得できませんでした</p>
      </div>
    );
  }

  const DOW_LABEL = ['日','月','火','水','木','金','土'];
  const today     = data.today;
  // 「過去の未入力日」（警告対象）と「今日の未入力」（リマインド）
  const missingPast = data.days.filter(d => !d.logged && d.date <  today);
  const todayCell   = data.days.find(d => d.date === today);
  const todayUnset  = todayCell && !todayCell.logged;
  const hasWarning  = missingPast.length > 0;

  const loggedCount = data.days.filter(d => d.logged).length;
  const totalCount  = data.days.length;

  return (
    <div className={`rounded-xl border shadow-sm overflow-hidden ${hasWarning ? 'border-amber-300 bg-amber-50' : 'border-slate-200 bg-white'}`}>
      {/* ヘッダー */}
      <div className={`px-4 py-3 flex items-center justify-between ${hasWarning ? 'bg-amber-100/60' : 'bg-slate-50'}`}>
        <div className="flex items-center gap-2">
          <IChart s={14} c={hasWarning ? 'text-amber-700' : 'text-slate-600'}/>
          <h3 className={`text-sm font-black ${hasWarning ? 'text-amber-900' : 'text-slate-700'}`}>
            直近の入力状況（営業日ベース）
          </h3>
        </div>
        <div className={`text-[11px] font-bold ${hasWarning ? 'text-amber-700' : 'text-slate-500'}`}>
          {loggedCount} / {totalCount} 日 入力済み
        </div>
      </div>

      {/* ドット列 */}
      <div className="p-4">
        <div className="flex items-center gap-2 flex-wrap">
          {data.days.map(d => {
            const isToday = d.date === today;
            const [y,m,day] = d.date.split('-');
            const label = `${Number(m)}/${Number(day)}`;
            const dow   = DOW_LABEL[d.dow];
            // セルの色分け
            //   ● 緑 = 入力済み
            //   ⚠ 黄 = 過去の未入力（警告）
            //   ○ グレー = 今日まだ未入力（リマインド）
            let cellClass, iconNode, stateLabel;
            if (d.logged) {
              cellClass  = 'bg-emerald-100 border-emerald-300 text-emerald-800';
              iconNode   = <span className="text-sm">●</span>;
              stateLabel = `${d.hours}h`;
            } else if (isToday) {
              cellClass  = 'bg-slate-100 border-slate-300 text-slate-500';
              iconNode   = <span className="text-sm">○</span>;
              stateLabel = '本日';
            } else {
              cellClass  = 'bg-amber-100 border-amber-400 text-amber-800';
              iconNode   = <span className="text-sm">⚠</span>;
              stateLabel = '未入力';
            }
            return (
              <button
                key={d.date}
                onClick={() => onNavigate('input', { date: d.date })}
                title={`${d.date} (${dow}) — ${stateLabel}`}
                className={`flex flex-col items-center justify-center w-14 h-16 rounded-lg border-2 transition-all hover:scale-105 hover:shadow ${cellClass} ${isToday ? 'ring-2 ring-blue-400 ring-offset-1' : ''}`}>
                <div className="text-[10px] font-bold">{label}</div>
                <div className="text-[9px] opacity-70">({dow})</div>
                {iconNode}
                <div className="text-[9px] font-bold">{stateLabel}</div>
              </button>
            );
          })}
        </div>

        {/* 警告メッセージ */}
        {hasWarning && (
          <div className="mt-4 pt-3 border-t border-amber-200">
            <div className="flex items-start gap-2">
              <span className="text-amber-600 text-base leading-none mt-0.5">⚠</span>
              <div className="flex-1">
                <p className="text-xs font-black text-amber-900">
                  以下の営業日に入力がありません（{missingPast.length}日）
                </p>
                <p className="text-[11px] text-amber-800 mt-1">
                  {missingPast.map(d => {
                    const [y,m,day] = d.date.split('-');
                    const dow = DOW_LABEL[d.dow];
                    return `${Number(m)}/${Number(day)}（${dow}）`;
                  }).join(' 、 ')}
                </p>
              </div>
              <button
                onClick={() => onNavigate('input', { date: missingPast[0].date })}
                className="text-[11px] font-black bg-amber-600 text-white hover:bg-amber-700 px-3 py-1.5 rounded-lg whitespace-nowrap transition-colors"
                title={`${missingPast[0].date} を初期値として入力画面を開きます`}>
                今すぐ入力
              </button>
            </div>
          </div>
        )}

        {/* 今日まだ未入力の場合の軽いリマインド（警告ではない） */}
        {!hasWarning && todayUnset && (
          <div className="mt-4 pt-3 border-t border-slate-200">
            <div className="flex items-center gap-2">
              <span className="text-slate-400 text-base leading-none">○</span>
              <p className="text-xs text-slate-600 flex-1">本日（{today.slice(5).replace('-','/')}）の入力はまだです</p>
              <button
                onClick={() => onNavigate('input')}
                className="text-[11px] font-bold border border-blue-300 text-blue-700 hover:bg-blue-50 px-3 py-1.5 rounded-lg whitespace-nowrap transition-colors">
                入力画面へ
              </button>
            </div>
          </div>
        )}

        {/* 全部入力済みで今日も済んでいる場合は控えめなメッセージ */}
        {!hasWarning && !todayUnset && (
          <div className="mt-4 pt-3 border-t border-emerald-200">
            <p className="text-xs text-emerald-700 font-bold flex items-center gap-2">
              <span>✓</span>
              直近{totalCount}営業日すべて入力済みです。お疲れさまです！
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

// ===================== ホーム画面 =====================
function HomeScreen({ users, projects, logs, targets, depts, lastSync, onNavigate, currentUser, isAdmin, onFetchMyInputStatus }) {
  const thisMonth = today().substring(0,7);
  const totalH    = logs.reduce((s,l)=>s+Number(l.hours||0), 0);
  const monthH    = logs.filter(l=>ym(l.date)===thisMonth).reduce((s,l)=>s+Number(l.hours||0), 0);
  const activeProjects = projects.filter(p => !p.isClosed);

  // 今週の集計（月曜〜今日）
  const weekStart = useMemo(() => {
    const d = new Date();
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    return d.toISOString().split('T')[0];
  }, []);
  const weekH = logs.filter(l => l.date >= weekStart).reduce((s,l)=>s+Number(l.hours||0), 0);

  // 今月の部署別集計
  // ※ 記録時点の所属部署 (l.department) で集計する。
  //    ユーザーが途中で異動しても、過去の記録は元の部署に帰属したまま集計される。
  const deptMonthly = useMemo(() => {
    const m = {};
    depts.forEach(d => m[d] = 0);
    logs.filter(l=>ym(l.date)===thisMonth).forEach(l => {
      // 後方互換: l.department が無い古いデータは、現在の所属にフォールバック
      const dept = l.department || users.find(u => u.id === l.userId)?.department;
      if (dept && m[dept] !== undefined) m[dept] += Number(l.hours||0);
    });
    const max = Math.max(...Object.values(m), 1);
    return Object.entries(m).map(([dept, h]) => ({ dept, h, pct: (h/max*100) }));
  }, [logs, users, depts, thisMonth]);

  // 今月の注番ランキング TOP 5
  const topProjects = useMemo(() => {
    const m = {};
    logs.filter(l=>ym(l.date)===thisMonth).forEach(l => {
      const key = l.projectNo || '__NO_PROJECT__';
      m[key] = (m[key]||0) + Number(l.hours||0);
    });
    return Object.entries(m)
      .map(([no, h]) => {
        if (no === '__NO_PROJECT__') return { no:null, h, client:'注番なしの作業' };
        return { no, h, client: projects.find(p=>p.no===no)?.client || '' };
      })
      .sort((a,b)=>b.h-a.h)
      .slice(0,5);
  }, [logs, projects, thisMonth]);

  // 今月の担当者ランキング TOP 5
  const topUsers = useMemo(() => {
    const m = {};
    logs.filter(l=>ym(l.date)===thisMonth).forEach(l => {
      m[l.userId] = (m[l.userId]||0) + Number(l.hours||0);
    });
    return Object.entries(m)
      .map(([uid, h]) => {
        const u = users.find(u=>u.id===Number(uid));
        return { name: u?.name || '不明', dept: u?.department || '', h };
      })
      .sort((a,b)=>b.h-a.h)
      .slice(0,5);
  }, [logs, users, thisMonth]);

  // 出荷後対応比率（今月）
  const monthLogs = logs.filter(l=>ym(l.date)===thisMonth);
  const afterH = monthLogs.filter(l=>l.afterShipment).reduce((s,l)=>s+Number(l.hours||0), 0);
  const afterPct = monthH > 0 ? (afterH/monthH*100) : 0;

  const menus = [
    { id:'input',    icon:<IEdit s={30}/>,  title:'入力画面',       desc:'日々の作業時間を記録',             color:'from-blue-500 to-blue-700',       border:'border-blue-200' },
    { id:'analysis', icon:<IChart s={30}/>, title:'データ解析画面', desc:'一覧表示・集計・CSV出力',          color:'from-violet-500 to-violet-700',   border:'border-violet-200' },
    ...(isAdmin ? [{ id:'settings', icon:<ICog s={30}/>,   title:'環境設定画面',   desc:'ユーザー・グループ・作業内容管理', color:'from-slate-600 to-slate-800',     border:'border-slate-200' }] : []),
  ];

  // 現在の期
  const fyLabel = fiscalLabel(today());

  return (
    <div className="max-w-6xl mx-auto space-y-6">
      <div className="text-center py-2">
        <h2 className="text-2xl sm:text-3xl font-black text-slate-800">作業時間 一元管理システム</h2>
        <p className="text-sm text-slate-500 mt-2">部署を超えて工数を統一管理 — 目標と実績を可視化</p>
        <div className="mt-2 inline-flex items-center gap-2 bg-gradient-to-r from-blue-100 to-indigo-100 text-indigo-800 text-xs font-black px-4 py-1.5 rounded-full border border-indigo-200">
          <IChart s={12}/>
          現在: {fyLabel}（{new Date().getFullYear()}年{new Date().getMonth()+1}月）
        </div>
      </div>

      {/* 入力忘れ防止パネル（直近7営業日の入力状況） */}
      <InputStatusPanel onFetchMyInputStatus={onFetchMyInputStatus} onNavigate={onNavigate}/>

      {/* サマリー */}
      <div className="grid grid-cols-2 md:grid-cols-6 gap-3">
        {[
          { label:'登録ユーザー', val:users.length,            unit:'名', color:'text-blue-800',    bg:'bg-blue-50' },
          { label:'グループ',     val:depts.length,            unit:'個', color:'text-sky-800',     bg:'bg-sky-50' },
          { label:'進行中注番',   val:activeProjects.length,   unit:'件', color:'text-violet-800',  bg:'bg-violet-50' },
          { label:'今週累計',     val:weekH.toFixed(1),        unit:'h', color:'text-indigo-800',  bg:'bg-indigo-50' },
          { label:`${thisMonth} 累計`, val:monthH.toFixed(1),   unit:'h', color:'text-emerald-800', bg:'bg-emerald-50' },
          { label:'出荷後比率',   val:afterPct.toFixed(0),     unit:'%', color:'text-rose-800',    bg:'bg-rose-50' },
        ].map(({label,val,unit,color,bg}) => (
          <div key={label} className={`${bg} rounded-xl p-3 border border-white`}>
            <div className="text-[10px] font-bold text-slate-500 mb-1">{label}</div>
            <div className={`text-xl font-black ${color}`}>{val}<span className="text-[10px] font-bold text-slate-400 ml-1">{unit}</span></div>
          </div>
        ))}
      </div>

      {/* メニューカード */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {menus.map(m => (
          <button key={m.id} onClick={()=>onNavigate(m.id)}
            className={`menu-card bg-white rounded-2xl p-5 border-2 ${m.border} shadow-sm text-left flex flex-col gap-3 hover:border-blue-400`}>
            <div className={`w-12 h-12 rounded-2xl bg-gradient-to-br ${m.color} text-white flex items-center justify-center shadow-lg`}>
              {m.icon}
            </div>
            <div>
              <div className="text-base font-black text-slate-800">{m.title}</div>
              <div className="text-xs text-slate-500 mt-1">{m.desc}</div>
            </div>
            <div className="text-xs font-bold text-blue-600 mt-auto">開く →</div>
          </button>
        ))}
      </div>

      {/* 今月の分析 */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {/* 部署別バー */}
        <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm md:col-span-1">
          <div className="flex items-center gap-2 mb-4">
            <IChart s={16} c="text-slate-500"/>
            <h3 className="text-sm font-black text-slate-700">今月の部署別</h3>
          </div>
          <div className="space-y-2">
            {deptMonthly.map(({dept, h, pct}) => (
              <div key={dept}>
                <div className="flex justify-between text-[11px] font-bold text-slate-600 mb-1">
                  <span className="truncate">{dept}</span>
                  <span>{h.toFixed(1)}h</span>
                </div>
                <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full bar-fill ${getDeptColor(dept).split(' ')[0].replace('bg-','bg-').replace('100','500')}`} style={{width:`${pct.toFixed(0)}%`}}/>
                </div>
              </div>
            ))}
            {deptMonthly.every(d=>d.h===0) && <p className="text-xs text-slate-400 text-center py-4">データなし</p>}
          </div>
        </div>

        {/* 注番TOP5 */}
        <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center gap-2 mb-4">
            <IFolder s={16} c="text-slate-500"/>
            <h3 className="text-sm font-black text-slate-700">今月の注番TOP5</h3>
          </div>
          <div className="space-y-2">
            {topProjects.map((p, i) => (
              <div key={p.no || '__noproj__'} className="flex items-center gap-2 text-xs">
                <span className="w-5 h-5 rounded-full bg-blue-100 text-blue-700 text-[10px] font-black flex items-center justify-center flex-shrink-0">{i+1}</span>
                {p.no ? (
                  <>
                    <span className="font-bold text-blue-700 flex-shrink-0">{p.no}</span>
                    <span className="text-slate-400 truncate flex-1">{p.client}</span>
                  </>
                ) : (
                  <span className="font-bold text-amber-700 truncate flex-1">注番なし</span>
                )}
                <span className="font-black text-slate-700">{p.h.toFixed(1)}h</span>
              </div>
            ))}
            {topProjects.length===0 && <p className="text-xs text-slate-400 text-center py-4">データなし</p>}
          </div>
        </div>

        {/* 担当者TOP5 */}
        <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center gap-2 mb-4">
            <IUsers s={16} c="text-slate-500"/>
            <h3 className="text-sm font-black text-slate-700">今月の担当者TOP5</h3>
          </div>
          <div className="space-y-2">
            {topUsers.map((u, i) => (
              <div key={u.name+i} className="flex items-center gap-2 text-xs">
                <span className="w-5 h-5 rounded-full bg-violet-100 text-violet-700 text-[10px] font-black flex items-center justify-center flex-shrink-0">{i+1}</span>
                <span className="font-bold text-slate-700 flex-shrink-0">{u.name}</span>
                <span className={`text-[9px] font-black px-1.5 py-0.5 rounded-full ${getDeptColor(u.dept)}`}>{u.dept}</span>
                <span className="font-black text-slate-700 ml-auto">{u.h.toFixed(1)}h</span>
              </div>
            ))}
            {topUsers.length===0 && <p className="text-xs text-slate-400 text-center py-4">データなし</p>}
          </div>
        </div>
      </div>

      {/* グループ一覧 */}
      <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
        <div className="flex items-center gap-2 mb-3">
          <IUsers s={16} c="text-slate-500"/>
          <h3 className="text-sm font-black text-slate-700">登録グループ</h3>
        </div>
        <div className="flex flex-wrap gap-2">
          {depts.map(d => {
            const cnt = users.filter(u=>u.department===d).length;
            return (
              <div key={d} className={`text-xs font-bold px-3 py-1.5 rounded-full ${getDeptColor(d)}`}>
                {d} <span className="opacity-60">({cnt})</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ===================== 入力画面 =====================
function InputScreen({ users, projects, logs, workContents, targets, lastLog, onSave, currentUser, presetDate, onPresetDateConsumed }) {
  // 担当者はログインユーザーに固定
  const fixedUserId = currentUser ? String(currentUser.id) : '';
  // マウント時に presetDate が渡されていれば、それを初期日付として使う。
  // それ以外は本日（today()）。
  //   例: ホーム画面の「入力忘れ」パネルで 4/10 のチップをクリック
  //       → navigate('input', { date: '2026-04-10' })
  //       → pendingInputDate が '2026-04-10' に
  //       → InputScreen がマウント、初期 form.date が '2026-04-10' になる
  //       → 下の useEffect が onPresetDateConsumed() を呼んで親の state を null に戻す
  const initialDate = presetDate || today();
  const blank = { userId: fixedUserId, date:initialDate, projectNo:'', content:'', hours:'', location:'社内', afterShipment:false, details:'', targetHours:'', isNewProject:false, newClient:'', newSubject:'', customContent:'' };
  const [form, setForm]     = useState({ ...blank });
  const [pInput, setPInput] = useState('');
  const [showSug, setShowSug] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [hasProject, setHasProject] = useState(true); // 注番あり/なし
  const sugRef = useRef(null);

  // ログインユーザーが変わったら userId を同期（ログアウト/再ログイン時）
  useEffect(() => {
    setForm(prev => ({ ...prev, userId: fixedUserId }));
  }, [fixedUserId]);

  // presetDate を 1 回だけ消費する。マウント時に initialDate で
  // 既に反映済みなので、ここでは親の state をクリアするだけ。
  // これにより、次に入力画面を開いたときは通常の today() に戻る。
  useEffect(() => {
    if (presetDate && onPresetDateConsumed) {
      onPresetDateConsumed();
    }
    // 初回マウント時のみ発火させたい（presetDate の変化で再実行しない）
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const f = (patch) => setForm(prev => ({ ...prev, ...patch }));

  // 前回の入力を再利用（担当者はログインユーザー固定）
  //   NOTE: 日付は「現在フォームに入っている日付」をそのまま維持する。
  //         当日に強制リセットしない理由:
  //           - ホームの入力忘れパネルから 4/10 を指定して入力画面に
  //             入ったときに、再利用を押した途端 4/15 に戻ってしまう
  //             のを避けるため。
  //           - 過去日の埋め戻し作業でも「前回の内容を流用して日付だけ
  //             違う」という使い方をする想定。
  const reuseLast = () => {
    if (!lastLog) return;
    const hadProj = !!lastLog.projectNo;
    const p = hadProj ? projects.find(pr => pr.no === lastLog.projectNo) : null;
    setHasProject(hadProj);
    setForm(prev => ({
      userId: fixedUserId,
      date: prev.date,  // 現在の日付を維持
      projectNo: lastLog.projectNo || '',
      content: lastLog.content,
      hours: String(lastLog.hours),
      location: lastLog.location || '社内',
      afterShipment: !!lastLog.afterShipment,
      details: lastLog.details || '',
      targetHours: '',
      isNewProject: false,
      newClient: p?.client || '',
      newSubject: p?.subject || '',
      customContent: ''
    }));
    setPInput(lastLog.projectNo || '');
  };

  // 選択中の担当者が「最近入力した注番」→ 直近の作業日を優先順位にする
  const userRecentMap = useMemo(() => {
    const map = {};
    if (!form.userId) return map;
    const uid = Number(form.userId);
    (logs || []).forEach(l => {
      if (l.userId !== uid) return;
      if (!l.projectNo) return; // 注番なしのログは除外
      const cur = map[l.projectNo];
      if (!cur || l.date > cur) map[l.projectNo] = l.date;
    });
    return map;
  }, [logs, form.userId]);

  const filteredP = useMemo(() => {
    const q = pInput.toLowerCase().trim();
    const openProjects = projects.filter(p => !p.isClosed);
    const userUsed = (p) => userRecentMap[p.no] || '';
    const scored = (p) => {
      // 1) 担当者が使用済み → 最近の日付（降順）
      // 2) 未使用 → プロジェクトの lastUsed（降順）
      const d = userUsed(p);
      if (d) return `2_${d}`;         // 担当者の履歴あり（優先）
      return `1_${p.lastUsed || 0}`;  // 履歴なし
    };
    const sortFn = (a, b) => scored(b).localeCompare(scored(a));
    if (!q) return [...openProjects].sort(sortFn).slice(0, 15);
    return openProjects.filter(p =>
      p.no.toLowerCase().includes(q) ||
      (p.client||'').toLowerCase().includes(q) ||
      (p.subject||'').toLowerCase().includes(q)
    ).sort(sortFn).slice(0, 15);
  }, [pInput, projects, userRecentMap]);

  const selectedUser = users.find(u => u.id === Number(form.userId));
  const contents = selectedUser ? (workContents[selectedUser.department] || []) : [];
  const isNewProject = hasProject && pInput && !projects.some(p => p.no === pInput);

  // 目標時間が必要かどうか：注番ありモード＋担当者＋注番が確定しており、ProjectTargetsに未登録
  const needsTarget = useMemo(() => {
    if (!hasProject || !form.userId || !pInput) return false;
    return !findTarget(targets, Number(form.userId), pInput);
  }, [hasProject, form.userId, pInput, targets]);

  const existingTarget = useMemo(() => {
    if (!hasProject || !form.userId || !pInput) return null;
    return findTarget(targets, Number(form.userId), pInput);
  }, [hasProject, form.userId, pInput, targets]);

  const selectProject = (p) => {
    setPInput(p.no);
    f({ projectNo: p.no, isNewProject: false, newClient: p.client, newSubject: p.subject });
    setShowSug(false);
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (hasProject && !pInput) return;
    if (needsTarget && (!form.targetHours || Number(form.targetHours) <= 0)) {
      alert('この注番は初めての入力です。目標時間を入力してください。');
      return;
    }
    // 注番なしの場合は 内容詳細 必須
    if (!hasProject && (!form.details || !form.details.trim())) {
      alert('注番なしの作業記録は「内容詳細」の入力が必須です。');
      return;
    }
    // 「その他」が選ばれていたら customContent を実際の内容として使用
    const finalContent = form.content === '__OTHER__' ? (form.customContent || '').trim() : form.content;
    if (!finalContent) {
      alert('作業内容を入力してください。');
      return;
    }
    setSubmitting(true);
    const payload = {
      ...form,
      content: finalContent,
      userId: Number(form.userId),
      hours: Number(form.hours),
      projectNo: hasProject ? pInput : null,
      isNewProject: hasProject ? isNewProject : false,
      newClient:  hasProject ? form.newClient  : '',
      newSubject: hasProject ? form.newSubject : '',
      targetHours: (hasProject && needsTarget) ? Number(form.targetHours) : undefined
    };
    const ok = await onSave(payload);
    if (ok) { setForm({ ...blank, userId: form.userId, date: form.date }); setPInput(''); }
    setSubmitting(false);
  };

  return (
    <div className="max-w-4xl mx-auto">
      <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
        <div className="flex items-center justify-between mb-6">
          <h2 className="text-lg font-black text-slate-800 flex items-center gap-2"><IEdit s={20} c="text-blue-600"/> 作業記録を入力</h2>
          {lastLog && (
            <button type="button" onClick={reuseLast}
              className="flex items-center gap-1.5 text-xs font-black text-blue-700 border-2 border-blue-200 bg-blue-50 hover:bg-blue-100 hover:border-blue-300 px-3 py-1.5 rounded-lg transition-colors">
              <ICopy s={14}/> 前回の入力を再利用
            </button>
          )}
        </div>
        <form onSubmit={handleSubmit}>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {/* 左列 */}
            <div className="space-y-5">
              {/* 担当者（ログインユーザー固定） */}
              <div className="space-y-1.5">
                <label className="text-xs font-black text-slate-600 uppercase tracking-wider">担当者</label>
                <div className="w-full border-2 border-slate-200 bg-slate-50 rounded-xl px-3 py-2.5 text-sm text-slate-700 font-bold flex items-center justify-between">
                  <span className="flex items-center gap-2">
                    <IUser s={16} c="text-slate-400"/>
                    {selectedUser ? selectedUser.name : (currentUser ? currentUser.name : '—')}
                  </span>
                  {selectedUser && (
                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${getDeptColor(selectedUser.department)}`}>{selectedUser.department}</span>
                  )}
                </div>
              </div>

              {/* 作業日 */}
              <div className="space-y-1.5">
                <label className="text-xs font-black text-slate-600 uppercase tracking-wider">作業日 *</label>
                <input type="date" required value={form.date} onChange={e=>f({ date:e.target.value })}
                  className="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none"/>
              </div>

              {/* 注番あり/なし トグル */}
              <div className="space-y-1.5">
                <label className="text-xs font-black text-slate-600 uppercase tracking-wider">注番の有無 *</label>
                <div className="grid grid-cols-2 gap-2">
                  <button type="button" onClick={()=>{ setHasProject(true); }}
                    className={`px-3 py-2.5 rounded-xl text-sm font-black border-2 transition-all flex items-center justify-center gap-2 ${hasProject ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-500 border-slate-200 hover:border-blue-300'}`}>
                    <IFolder s={14}/> 注番あり
                  </button>
                  <button type="button" onClick={()=>{ setHasProject(false); setPInput(''); f({ projectNo:'', targetHours:'', isNewProject:false, newClient:'', newSubject:'' }); }}
                    className={`px-3 py-2.5 rounded-xl text-sm font-black border-2 transition-all flex items-center justify-center gap-2 ${!hasProject ? 'bg-amber-500 text-white border-amber-500 shadow-md' : 'bg-white text-slate-500 border-slate-200 hover:border-amber-300'}`}>
                    <IEdit s={14}/> 注番なし
                  </button>
                </div>
                {!hasProject && (
                  <p className="text-[10px] font-bold text-amber-600 flex items-center gap-1 mt-1">
                    ⚠ 注番なしの場合、「内容詳細」の入力が必須になります
                  </p>
                )}
              </div>

              {/* 注番 */}
              {hasProject && (
              <div className="space-y-1.5 relative" ref={sugRef}>
                <label className="text-xs font-black text-slate-600 uppercase tracking-wider">
                  注番 *
                  {!selectedUser && <span className="ml-2 text-[10px] font-bold text-amber-600 normal-case">← 先に担当者を選択してください</span>}
                </label>
                <div className="relative">
                  <input type="text" required value={pInput} disabled={!selectedUser}
                    onChange={e => { setPInput(e.target.value); f({ projectNo:e.target.value, targetHours:'' }); setShowSug(true); }}
                    onFocus={() => setShowSug(true)}
                    onBlur={() => setTimeout(()=>setShowSug(false), 200)}
                    placeholder={selectedUser ? '注番 / 客先 / 件名 で絞り込み検索' : '担当者を選択すると入力できます'}
                    className="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 pr-9 text-sm focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed"/>
                  <ISearch s={16} c="absolute right-3 top-3 text-slate-400"/>
                </div>

                {showSug && selectedUser && (
                  <div className="absolute z-20 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-2xl overflow-hidden slide-down">
                    {filteredP.length > 0 && (
                      <div className="max-h-60 overflow-y-auto">
                        {(() => {
                          const recent = filteredP.filter(p => userRecentMap[p.no]);
                          const others = filteredP.filter(p => !userRecentMap[p.no]);
                          return (
                            <>
                              {recent.length > 0 && (
                                <>
                                  <div className="px-3 py-1.5 text-[10px] font-black text-blue-600 uppercase tracking-wider bg-blue-50 border-b border-blue-100 flex items-center gap-1">
                                    <IStar s={11}/> {selectedUser.name} さんの最近の注番
                                  </div>
                                  {recent.map(p => (
                                    <div key={p.no} onMouseDown={()=>selectProject(p)}
                                      className="flex items-center justify-between px-3 py-2.5 hover:bg-blue-50 cursor-pointer border-b border-slate-50 transition-colors bg-blue-50/30">
                                      <div className="flex items-center gap-2">
                                        <IStar s={11} c="text-blue-400"/>
                                        <span className="font-black text-blue-700 text-sm">{p.no}</span>
                                      </div>
                                      <span className="text-xs text-slate-500 truncate max-w-[55%]">
                                        {p.client} / {p.subject}
                                        <span className="ml-2 text-[9px] text-blue-500 font-bold">最終 {fmtDate(userRecentMap[p.no])}</span>
                                      </span>
                                    </div>
                                  ))}
                                </>
                              )}
                              {others.length > 0 && (
                                <>
                                  <div className="px-3 py-1.5 text-[10px] font-black text-slate-400 uppercase tracking-wider bg-slate-50 border-b">
                                    {recent.length > 0 ? 'その他の注番' : '登録済み注番'}
                                  </div>
                                  {others.map(p => (
                                    <div key={p.no} onMouseDown={()=>selectProject(p)}
                                      className="flex items-center justify-between px-3 py-2.5 hover:bg-blue-50 cursor-pointer border-b border-slate-50 transition-colors">
                                      <span className="font-bold text-blue-700 text-sm">{p.no}</span>
                                      <span className="text-xs text-slate-500 truncate max-w-[55%]">{p.client} / {p.subject}</span>
                                    </div>
                                  ))}
                                </>
                              )}
                            </>
                          );
                        })()}
                      </div>
                    )}
                    {isNewProject && (
                      <div className="px-3 py-2.5 bg-amber-50 border-t border-amber-100">
                        <span className="text-xs font-black text-amber-700">⊕ 新規注番として登録：「{pInput}」</span>
                      </div>
                    )}
                    {filteredP.length === 0 && !isNewProject && (
                      <div className="px-3 py-4 text-center text-xs text-slate-400">一致する注番がありません</div>
                    )}
                  </div>
                )}
              </div>
              )}

              {/* 新規注番フォーム */}
              {hasProject && isNewProject && pInput && (
                <div className="p-4 bg-amber-50 rounded-xl border-2 border-amber-200 space-y-3 fade-in">
                  <p className="text-xs font-black text-amber-700 flex items-center gap-1.5">⚠ 新規注番です。客先と件名を入力してください</p>
                  <div className="grid grid-cols-2 gap-3">
                    <div className="space-y-1">
                      <label className="text-[10px] font-bold text-amber-700">客先名 *</label>
                      <input required value={form.newClient} onChange={e=>f({ newClient:e.target.value })}
                        placeholder="○○工業株式会社"
                        className="w-full border-2 border-amber-200 rounded-lg px-2 py-1.5 text-sm focus:border-amber-400 outline-none bg-white"/>
                    </div>
                    <div className="space-y-1">
                      <label className="text-[10px] font-bold text-amber-700">件名 *</label>
                      <input required value={form.newSubject} onChange={e=>f({ newSubject:e.target.value })}
                        placeholder="△△制御盤製作"
                        className="w-full border-2 border-amber-200 rounded-lg px-2 py-1.5 text-sm focus:border-amber-400 outline-none bg-white"/>
                    </div>
                  </div>
                </div>
              )}

              {/* 目標時間 — 担当者×注番が初回のときのみ表示 */}
              {needsTarget && (
                <div className="p-4 bg-emerald-50 rounded-xl border-2 border-emerald-200 space-y-2 fade-in">
                  <label className="text-xs font-black text-emerald-700 flex items-center gap-1.5">
                    <ITarget s={14}/> この注番の目標時間（初回のみ必須）*
                  </label>
                  <div className="flex items-center gap-2">
                    <input type="number" step="0.5" min="0.5" required value={form.targetHours}
                      onChange={e=>f({ targetHours:e.target.value })}
                      placeholder="例：40"
                      className="w-32 border-2 border-emerald-200 rounded-lg px-3 py-2 text-sm focus:border-emerald-400 outline-none bg-white font-bold"/>
                    <span className="text-sm font-bold text-emerald-700">h</span>
                    <span className="text-[10px] text-emerald-600 ml-2">あなたがこの注番で作業する目標時間を入力してください</span>
                  </div>
                </div>
              )}
              {existingTarget && !needsTarget && form.userId && pInput && (
                <div className="p-3 bg-slate-50 rounded-xl border border-slate-200 flex items-center gap-2 text-xs">
                  <ITarget s={14} c="text-slate-500"/>
                  <span className="font-bold text-slate-600">この注番の目標時間：</span>
                  <span className="font-black text-slate-800">{fmtH(existingTarget.targetHours)}</span>
                  <span className="text-slate-400">（設定済み）</span>
                </div>
              )}
            </div>

            {/* 右列 */}
            <div className="space-y-5">
              {/* 作業内容 */}
              <div className="space-y-1.5">
                <label className="text-xs font-black text-slate-600 uppercase tracking-wider">作業内容 *</label>
                <select required value={form.content} onChange={e=>f({ content:e.target.value, customContent:'' })} disabled={!selectedUser}
                  className="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none disabled:bg-slate-100 disabled:text-slate-400 transition-all">
                  <option value="">{selectedUser ? '— 選択してください —' : '先に担当者を選んでください'}</option>
                  {contents.map(c => <option key={c} value={c}>{c}</option>)}
                  {selectedUser && <option value="__OTHER__">その他（フリー入力）</option>}
                </select>
                {form.content === '__OTHER__' && (
                  <input type="text" required value={form.customContent} onChange={e=>f({ customContent:e.target.value })}
                    placeholder="作業内容を自由に入力"
                    className="w-full border-2 border-amber-300 bg-amber-50 rounded-xl px-3 py-2 text-sm focus:border-amber-400 outline-none mt-1.5"/>
                )}
              </div>

              {/* 時間 / 場所 */}
              <div className="grid grid-cols-2 gap-3">
                <div className="space-y-1.5">
                  <label className="text-xs font-black text-slate-600 uppercase tracking-wider">時間（h） *</label>
                  <input type="number" step="0.5" min="0.5" max="24" required value={form.hours} onChange={e=>f({ hours:e.target.value })}
                    placeholder="例：3.5"
                    className="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none"/>
                </div>
                <div className="space-y-1.5">
                  <label className="text-xs font-black text-slate-600 uppercase tracking-wider">作業場所</label>
                  <select value={form.location} onChange={e=>f({ location:e.target.value })}
                    className="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:border-blue-400 outline-none">
                    <option value="社内">社内</option>
                    <option value="社外">社外</option>
                  </select>
                </div>
              </div>

              {/* 出荷後対応 */}
              <label className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border-2 border-dashed border-slate-200 cursor-pointer hover:border-blue-200 hover:bg-blue-50/30 transition-all">
                <input type="checkbox" checked={form.afterShipment} onChange={e=>f({ afterShipment:e.target.checked })} className="w-5 h-5 rounded"/>
                <span className="text-sm font-bold text-slate-700">出荷後対応に該当</span>
                {form.afterShipment && <span className="ml-auto text-[10px] bg-red-100 text-red-700 font-black px-2 py-0.5 rounded-full">該当</span>}
              </label>

              {/* 内容詳細 */}
              <div className="space-y-1.5">
                <label className="text-xs font-black text-slate-600 uppercase tracking-wider">
                  内容詳細{!hasProject && <span className="text-amber-600 ml-1">*</span>}
                  {!hasProject && <span className="ml-2 text-[10px] font-bold text-amber-600 normal-case">（注番なしの場合は必須）</span>}
                </label>
                <textarea value={form.details} onChange={e=>f({ details:e.target.value })} rows={4}
                  required={!hasProject}
                  placeholder={hasProject ? '作業の詳細を入力してください' : '注番なしの作業内容を具体的に入力してください'}
                  className={`w-full border-2 rounded-xl px-3 py-2.5 text-sm focus:ring-4 outline-none resize-none ${!hasProject ? 'border-amber-300 bg-amber-50/50 focus:border-amber-400 focus:ring-amber-50' : 'border-slate-200 focus:border-blue-400 focus:ring-blue-50'}`}/>
              </div>
            </div>
          </div>

          {/* 送信ボタン */}
          <div className="mt-8 pt-6 border-t border-slate-100">
            <button type="submit" disabled={submitting}
              className="w-full bg-blue-700 hover:bg-blue-800 disabled:bg-slate-400 text-white py-3.5 rounded-xl font-black text-base shadow-lg transition-all active:scale-[0.99] flex items-center justify-center gap-2">
              {submitting ? <IRefresh s={20} c="animate-spin"/> : <ISave s={20}/>}
              {submitting ? '登録中...' : '作業データを登録する'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ===================== データ解析画面（一覧 + 集計 タブ）=====================
function AnalysisScreen({ logs, users, projects, targets, depts, workContents, totalLogs, rangeTotal, loadedRange, onExpandRange, onFetchLogsByRange, onFetchYoY, onUpdate, onDelete, onUpdateTarget, onLoadMore, currentUser, isLeader, onFetchTargetHistory }) {
  // NOTE: subTab は localStorage に永続化する（usePersistedState）。
  //   親コンポーネント（App）は isLoading=true の間、画面全体を
  //   ローディングスピナーに差し替えるため、AnalysisScreen が
  //   アンマウント→再マウントされる。useState だと再マウントで
  //   'list' に戻ってしまい、「集計画面で期を変更するとデータ一覧
  //   タブに飛ばされる」バグになる。永続化することでアンマウントを
  //   跨いで選択状態を維持する。
  const [subTab, setSubTab] = usePersistedState('analysis.subTab', 'list');

  return (
    <div className="space-y-4">
      {/* サブタブ */}
      <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div className="flex border-b border-slate-200">
          {[
            { id:'list',    icon:<IList s={16}/>,  label:'データ一覧' },
            { id:'summary', icon:<IChart s={16}/>, label:'集計画面' },
          ].map(({id,icon,label}) => (
            <button key={id} onClick={()=>setSubTab(id)}
              className={`flex items-center gap-2 px-6 py-3.5 text-sm font-bold transition-all border-b-2 ${subTab===id ? 'border-blue-600 text-blue-700 bg-blue-50/50' : 'border-transparent text-slate-500 hover:bg-slate-50'}`}>
              {icon}{label}
            </button>
          ))}
        </div>
      </div>
