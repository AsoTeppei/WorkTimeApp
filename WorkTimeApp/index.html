      {subTab==='list'    && <ListScreen    logs={logs} users={users} projects={projects} targets={targets} depts={depts} workContents={workContents} totalLogs={totalLogs} rangeTotal={rangeTotal} loadedRange={loadedRange} onExpandRange={onExpandRange} onUpdate={onUpdate} onDelete={onDelete} onLoadMore={onLoadMore}/>}
      {subTab==='summary' && <SummaryScreen logs={logs} users={users} projects={projects} targets={targets} depts={depts} loadedRange={loadedRange} onExpandRange={onExpandRange} onFetchLogsByRange={onFetchLogsByRange} onFetchYoY={onFetchYoY} onUpdateTarget={onUpdateTarget} currentUser={currentUser} isLeader={isLeader} onFetchTargetHistory={onFetchTargetHistory}/>}
    </div>
  );
}

// ===================== データ一覧画面 =====================
function ListScreen({ logs, users, projects, targets, depts, workContents, totalLogs, rangeTotal, loadedRange, onExpandRange, onUpdate, onDelete, onLoadMore }) {
  const [filter, setFilter] = usePersistedState('list.filter', { dateMode:'range', dateFrom:'', dateTo:'', dateSingle:'', dept:'', userId:'', projectNo:'', projectNoMode:'' });
  const [sort, setSort]     = usePersistedState('list.sort',   { key:'date', dir:'desc' });
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [saving, setSaving] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [loadingMore, setLoadingMore] = useState(false);
  const [expanding, setExpanding] = useState(false);

  const handleLoadMore = async () => {
    setLoadingMore(true);
    await onLoadMore(logs.length);
    setLoadingMore(false);
  };

  const handleExpandRange = async (months) => {
    if (!onExpandRange) return;
    setExpanding(true);
    await onExpandRange(months);
    setExpanding(false);
  };

  const confirmDelete = async () => {
    if (!deleteConfirm) return;
    const ok = await onDelete(deleteConfirm.id);
    if (ok) setDeleteConfirm(null);
  };

  const ff = p => setFilter(prev => ({ ...prev, ...p }));
  const deptUsers = filter.dept ? users.filter(u=>u.department===filter.dept) : users;

  const filtered = useMemo(() => {
    return logs.filter(l => {
      if (filter.dateMode === 'single') {
        if (filter.dateSingle && l.date !== filter.dateSingle) return false;
      } else {
        if (filter.dateFrom && l.date < filter.dateFrom) return false;
        if (filter.dateTo   && l.date > filter.dateTo)   return false;
      }
      if (filter.userId   && l.userId !== Number(filter.userId)) return false;
      if (filter.dept) {
        // 記録時点の所属部署で絞り込む（異動後も過去の記録は元部署に属する）
        const recDept = l.department || users.find(u=>u.id===l.userId)?.department;
        if (recDept !== filter.dept) return false;
      }
      if (filter.projectNoMode === 'none') {
        if (l.projectNo) return false; // 注番なしのみ
      } else if (filter.projectNoMode === 'has') {
        if (!l.projectNo) return false; // 注番ありのみ
      }
      if (filter.projectNo && filter.projectNoMode !== 'none') {
        const q = filter.projectNo.toLowerCase();
        if (!(l.projectNo || '').toLowerCase().includes(q)) return false;
      }
      return true;
    });
  }, [logs, filter, users]);

  // 担当者×注番ごとの実績合計
  const userProjectActual = useMemo(() => {
    const m = {};
    logs.forEach(l => {
      const k = `${l.userId}__${l.projectNo}`;
      m[k] = (m[k]||0) + Number(l.hours||0);
    });
    return m;
  }, [logs]);

  const sorted = useMemo(() => {
    return [...filtered].sort((a,b) => {
      let av = a[sort.key], bv = b[sort.key];
      if (sort.key==='userName') { av = users.find(u=>u.id===a.userId)?.name||''; bv = users.find(u=>u.id===b.userId)?.name||''; }
      if (sort.key==='target')   { av = findTarget(targets,a.userId,a.projectNo)?.targetHours||0; bv = findTarget(targets,b.userId,b.projectNo)?.targetHours||0; }
      if (sort.key==='actual')   { av = userProjectActual[`${a.userId}__${a.projectNo}`]||0;    bv = userProjectActual[`${b.userId}__${b.projectNo}`]||0; }
      if (av < bv) return sort.dir==='asc' ? -1 : 1;
      if (av > bv) return sort.dir==='asc' ? 1 : -1;
      return 0;
    });
  }, [filtered, sort, users, targets, userProjectActual]);

  const toggleSort = (key) => setSort(prev => ({ key, dir: prev.key===key && prev.dir==='asc' ? 'desc' : 'asc' }));

  const SortIcon = ({ k }) => {
    if (sort.key !== k) return <span className="text-slate-300 ml-1">↕</span>;
    return <span className="text-blue-600 ml-1">{sort.dir==='asc' ? '↑' : '↓'}</span>;
  };

  const startEdit = (log) => {
    const dept = log.department || users.find(u=>u.id===log.userId)?.department;
    const deptContents = dept ? (workContents[dept]||[]) : [];
    const isKnownContent = deptContents.includes(log.content);
    setEditId(log.id);
    setEditForm({ ...log, content: isKnownContent ? log.content : '__OTHER__', customContent: isKnownContent ? '' : log.content });
  };
  const cancelEdit = () => { setEditId(null); setEditForm({}); };

  const saveEdit = async () => {
    setSaving(true);
    const finalContent = editForm.content === '__OTHER__' ? (editForm.customContent || '').trim() : editForm.content;
    if (!finalContent) {
      alert('作業内容を入力してください。');
      setSaving(false);
      return;
    }
    const payload = { ...editForm, content: finalContent, hours: Number(editForm.hours) };
    const ok = await onUpdate(payload);
    if (ok) setEditId(null);
    setSaving(false);
  };

  const editUser = users.find(u=>u.id===Number(editForm.userId));
  // 編集時の作業内容候補は「記録時点の所属」優先（無ければユーザーの現所属にフォールバック）
  const editDept = editForm.department || editUser?.department;
  const editContents = editDept ? (workContents[editDept]||[]) : [];
  const editOptions = editForm.content && editForm.content !== '__OTHER__' && !editContents.includes(editForm.content)
    ? [editForm.content, ...editContents]
    : editContents;

  const Th = ({ k, label, right }) => (
    <th className={`px-4 py-3 ${right?'text-right':'text-left'} text-xs font-black text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-100 transition-colors whitespace-nowrap select-none`} onClick={()=>toggleSort(k)}>
      {label}<SortIcon k={k}/>
    </th>
  );

  return (
    <div className="space-y-4">
      {/* 読み込み範囲の表示と拡張 */}
      {loadedRange && (
        <div className="bg-amber-50 rounded-xl border border-amber-200 p-3 shadow-sm flex flex-wrap items-center gap-3">
          <div className="flex items-center gap-2 text-xs text-amber-900">
            <IRefresh s={14}/>
            <span className="font-black">表示範囲:</span>
            <span className="font-bold">{loadedRange.from} 〜 {loadedRange.to}</span>
            <span className="text-[10px] text-amber-600">
              （この範囲内: {rangeTotal || logs.length} 件 / 全期間: {totalLogs} 件）
            </span>
          </div>
          <div className="ml-auto flex items-center gap-2">
            <span className="text-[10px] text-slate-500">過去に遡る:</span>
            {[1, 3, 6, 12].map(m => (
              <button key={m} disabled={expanding}
                onClick={()=>handleExpandRange(m)}
                className="text-[10px] font-black border border-amber-300 bg-white hover:bg-amber-100 text-amber-800 px-2 py-1 rounded-md disabled:opacity-50 transition-colors">
                {expanding ? '…' : `+${m}ヶ月`}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* フィルターバー */}
      <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
        <div className="flex flex-wrap gap-3 items-end">
          <div className="flex items-center gap-2">
            <ISearch s={16} c="text-slate-400"/>
            <span className="text-xs font-black text-slate-500">絞り込み</span>
          </div>
          <select value={filter.dateMode || 'range'} onChange={e=>{
              const mode = e.target.value;
              if (mode === 'single') ff({ dateMode:'single', dateSingle: filter.dateSingle || today() });
              else ff({ dateMode:'range' });
            }}
            className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400">
            <option value="range">日付範囲</option>
            <option value="single">単日</option>
          </select>
          {filter.dateMode === 'single' ? (
            <div className="flex items-center gap-1">
              <button type="button"
                onClick={()=>ff({ dateSingle: shiftDate(filter.dateSingle || today(), -1) })}
                title="前日"
                className="border rounded-lg px-2 py-1.5 text-xs font-black text-slate-600 hover:bg-slate-100 transition-colors">◀</button>
              <input type="date" value={filter.dateSingle || ''} onChange={e=>ff({ dateSingle:e.target.value })} className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400"/>
              <button type="button"
                onClick={()=>ff({ dateSingle: shiftDate(filter.dateSingle || today(), +1) })}
                title="翌日"
                className="border rounded-lg px-2 py-1.5 text-xs font-black text-slate-600 hover:bg-slate-100 transition-colors">▶</button>
              <button type="button"
                onClick={()=>ff({ dateSingle: today() })}
                title="今日"
                className="border rounded-lg px-2 py-1.5 text-[10px] font-bold text-blue-700 hover:bg-blue-50 transition-colors">今日</button>
            </div>
          ) : (
            <div className="flex items-center gap-1.5">
              <input type="date" value={filter.dateFrom} onChange={e=>ff({ dateFrom:e.target.value })} className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400"/>
              <span className="text-slate-400 text-xs">〜</span>
              <input type="date" value={filter.dateTo} onChange={e=>ff({ dateTo:e.target.value })} className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400"/>
            </div>
          )}
          <select value={filter.dept} onChange={e=>ff({ dept:e.target.value, userId:'' })} className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400">
            <option value="">全部署</option>
            {depts.map(d=><option key={d} value={d}>{d}</option>)}
          </select>
          <select value={filter.userId} onChange={e=>ff({ userId:e.target.value })} className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400">
            <option value="">全担当者</option>
            {deptUsers.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
          <select value={filter.projectNoMode || ''} onChange={e=>ff({ projectNoMode:e.target.value, projectNo: e.target.value==='none' ? '' : filter.projectNo })}
            className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400">
            <option value="">注番すべて</option>
            <option value="has">注番ありのみ</option>
            <option value="none">注番なしのみ</option>
          </select>
          <input type="text" value={filter.projectNo} onChange={e=>ff({ projectNo:e.target.value })}
            list="list-projects-datalist" placeholder="注番（部分一致）"
            disabled={filter.projectNoMode==='none'}
            className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400 w-36 disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed"/>
          <datalist id="list-projects-datalist">
            {projects.map(p=><option key={p.no} value={p.no}>{p.client} / {p.subject}</option>)}
          </datalist>
          <button onClick={()=>{ setFilter({ dateMode:'range', dateFrom:'', dateTo:'', dateSingle:'', dept:'', userId:'', projectNo:'', projectNoMode:'' }); clearPref('list.filter'); }} className="text-xs text-slate-500 hover:text-slate-700 border rounded-lg px-2 py-1.5 transition-colors">リセット</button>
          <div className="ml-auto text-xs font-bold text-slate-400">{sorted.length} 件</div>
        </div>
      </div>

      {/* テーブル */}
      <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm border-collapse">
            <thead className="bg-slate-50 border-b-2 border-slate-200">
              <tr>
                <Th k="date"      label="作業日"/>
                <Th k="userName"  label="担当者"/>
                <Th k="projectNo" label="注番"/>
                <Th k="content"   label="作業内容"/>
                <Th k="hours"     label="時間" right/>
                <Th k="target"    label="目標" right/>
                <Th k="actual"    label="実作業計" right/>
                <Th k="location"  label="場所"/>
                <th className="px-4 py-3 text-xs font-black text-slate-500 uppercase">出荷後</th>
                <th className="px-4 py-3 text-xs font-black text-slate-500 uppercase">操作</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {sorted.map(l => {
                const u = users.find(u=>u.id===l.userId);
                const p = projects.find(p=>p.no===l.projectNo);
                const isEdit = editId === l.id;
                const target = findTarget(targets, l.userId, l.projectNo)?.targetHours;
                const actual = userProjectActual[`${l.userId}__${l.projectNo}`]||0;
                const progress = target ? (actual/target*100) : 0;
                // 表示部署は「記録時点の所属」を優先（ユーザーが異動しても過去の記録は元部署として表示）
                const recDept = l.department || u?.department || '';

                if (isEdit) return (
                  <tr key={l.id} className="bg-blue-50">
                    <td className="px-4 py-2"><input type="date" value={editForm.date} onChange={e=>setEditForm(f=>({...f,date:e.target.value}))} className="border rounded px-2 py-1 text-xs w-32"/></td>
                    <td className="px-4 py-2">
                      <select value={editForm.userId} onChange={e=>setEditForm(f=>({...f,userId:Number(e.target.value),content:''}))} className="border rounded px-2 py-1 text-xs">
                        {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                      </select>
                    </td>
                    <td className="px-4 py-2"><span className="text-xs font-bold text-blue-700">{editForm.projectNo || <span className="text-amber-600">注番なし</span>}</span></td>
                    <td className="px-4 py-2">
                      <div className="space-y-2">
                      <select value={editForm.content} onChange={e=>setEditForm(f=>({
                        ...f,
                        content:e.target.value,
                        customContent: e.target.value === '__OTHER__' ? f.customContent : ''
                      }))} className="border rounded px-2 py-1 text-xs w-full">
                        {editOptions.map(c=><option key={c} value={c}>{c}</option>)}
                        {editUser && <option value="__OTHER__">その他（フリー入力）</option>}
                      </select>
                      {editForm.content === '__OTHER__' && (
                        <input type="text" value={editForm.customContent || ''} onChange={e=>setEditForm(f=>({...f,customContent:e.target.value}))}
                          className="border rounded px-2 py-1 text-xs w-full"
                          placeholder="作業内容を入力してください"/>
                      )}
                    </div>
                    </td>
                    <td className="px-4 py-2"><input type="number" step="0.5" value={editForm.hours} onChange={e=>setEditForm(f=>({...f,hours:e.target.value}))} className="border rounded px-2 py-1 text-xs w-16"/></td>
                    <td className="px-4 py-2 text-right text-xs text-slate-400">{target?fmtH(target):'—'}</td>
                    <td className="px-4 py-2 text-right text-xs text-slate-400">{fmtH(actual)}</td>
                    <td className="px-4 py-2">
                      <select value={editForm.location} onChange={e=>setEditForm(f=>({...f,location:e.target.value}))} className="border rounded px-2 py-1 text-xs">
                        <option>社内</option><option>社外</option>
                      </select>
                    </td>
                    <td className="px-4 py-2 text-center"><input type="checkbox" checked={!!editForm.afterShipment} onChange={e=>setEditForm(f=>({...f,afterShipment:e.target.checked}))}/></td>
                    <td className="px-4 py-2">
                      <div className="flex gap-1">
                        <button onClick={saveEdit} disabled={saving} className="bg-blue-600 text-white px-2 py-1 rounded text-xs font-bold hover:bg-blue-700 flex items-center gap-1">
                          {saving ? <IRefresh s={12} c="animate-spin"/> : <ICheck s={12}/>} 保存
                        </button>
                        <button onClick={cancelEdit} className="border px-2 py-1 rounded text-xs text-slate-500 hover:bg-slate-100"><IX s={12}/></button>
                      </div>
                    </td>
                  </tr>
                );
                return (
                  <tr key={l.id} className="hover:bg-slate-50 transition-colors">
                    <td className="px-4 py-3 font-bold text-slate-700 whitespace-nowrap">{fmtDateDow(l.date)}</td>
                    <td className="px-4 py-3">
                      <div className="font-bold text-sm">{u?.name||'不明'}</div>
                      <span className={`text-[9px] font-black px-1.5 py-0.5 rounded-full ${getDeptColor(recDept)}`}>{recDept}</span>
                    </td>
                    <td className="px-4 py-3">
                      {l.projectNo ? (
                        <>
                          <div className="font-bold text-blue-700 text-sm">{l.projectNo}</div>
                          <div className="text-[10px] text-slate-400 truncate max-w-[130px]">{p?.client}</div>
                        </>
                      ) : (
                        <span className="text-[10px] font-black bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">注番なし</span>
                      )}
                    </td>
                    <td className="px-4 py-3">
                      <div className="font-bold text-sm">{l.content}</div>
                      {l.details && <div className="text-[10px] text-slate-400 truncate max-w-[200px] italic mt-0.5">{l.details}</div>}
                    </td>
                    <td className="px-4 py-3 text-right font-black text-slate-800 whitespace-nowrap">{fmtH(l.hours)}</td>
                    <td className="px-4 py-3 text-right whitespace-nowrap">
                      {target ? <span className="text-xs font-bold text-emerald-700">{fmtH(target)}</span> : <span className="text-xs text-slate-300">—</span>}
                    </td>
                    <td className="px-4 py-3 text-right whitespace-nowrap">
                      <div className="text-xs font-bold text-slate-700">{fmtH(actual)}</div>
                      {target && (
                        <div className="w-16 ml-auto bg-slate-100 h-1 rounded-full overflow-hidden mt-0.5">
                          <div className={`h-full ${progress>100?'bg-red-500':'bg-emerald-500'}`} style={{width:`${Math.min(progress,100).toFixed(0)}%`}}/>
                        </div>
                      )}
                    </td>
                    <td className="px-4 py-3">
                      <span className={`px-2 py-0.5 rounded-full text-[10px] font-black ${l.location==='社内' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>{l.location}</span>
                    </td>
                    <td className="px-4 py-3 text-center">
                      {l.afterShipment && <span className="text-[10px] font-black bg-red-100 text-red-700 px-1.5 py-0.5 rounded-full">該当</span>}
                    </td>
                    <td className="px-4 py-3">
                      <div className="flex gap-1">
                        <button onClick={()=>startEdit(l)} className="text-xs font-bold text-blue-600 hover:text-blue-800 border border-blue-200 hover:border-blue-400 px-2 py-1 rounded transition-colors">編集</button>
                        <button onClick={()=>setDeleteConfirm(l)} className="text-xs font-bold text-red-600 hover:text-red-800 border border-red-200 hover:border-red-400 px-2 py-1 rounded transition-colors">削除</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
              {sorted.length === 0 && (
                <tr><td colSpan="10" className="py-16 text-center font-bold text-slate-300">表示するデータがありません</td></tr>
              )}
            </tbody>
          </table>
        </div>
        {/* ページネーション */}
        {logs.length < (totalLogs || 0) && (
          <div className="p-4 border-t border-slate-100 bg-slate-50 text-center">
            <button onClick={handleLoadMore} disabled={loadingMore}
              className="bg-white border-2 border-blue-300 text-blue-700 hover:bg-blue-50 px-6 py-2 rounded-lg text-sm font-black transition-colors inline-flex items-center gap-2 disabled:opacity-50">
              {loadingMore ? <IRefresh s={14} c="animate-spin"/> : <IRefresh s={14}/>}
              もっと読み込む（残り {totalLogs - logs.length} 件）
            </button>
          </div>
        )}
      </div>

      {/* 削除確認モーダル */}
      {deleteConfirm && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={()=>setDeleteConfirm(null)}>
          <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 space-y-4" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center gap-3">
              <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center"><ITrash s={22} c="text-red-600"/></div>
              <div>
                <h3 className="text-lg font-black text-slate-800">作業記録を削除</h3>
                <p className="text-xs text-slate-500">この操作は取り消せません</p>
              </div>
            </div>
            <div className="bg-slate-50 rounded-lg p-3 text-sm space-y-1">
              <div><span className="text-slate-400 text-xs">作業日：</span><span className="font-bold">{fmtDate(deleteConfirm.date)}</span></div>
              <div><span className="text-slate-400 text-xs">担当者：</span><span className="font-bold">{users.find(u=>u.id===deleteConfirm.userId)?.name||'不明'}</span></div>
              <div><span className="text-slate-400 text-xs">注番　：</span>{deleteConfirm.projectNo ? <span className="font-bold text-blue-700">{deleteConfirm.projectNo}</span> : <span className="font-bold text-amber-700">注番なし</span>}</div>
              <div><span className="text-slate-400 text-xs">作業　：</span><span className="font-bold">{deleteConfirm.content}（{fmtH(deleteConfirm.hours)}）</span></div>
            </div>
            <div className="flex gap-2 justify-end">
              <button onClick={()=>setDeleteConfirm(null)} className="border-2 border-slate-300 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-50">キャンセル</button>
              <button onClick={confirmDelete} className="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-700 flex items-center gap-1"><ITrash s={14}/>削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== 集計画面 =====================
function SummaryScreen({ logs, users, projects, targets, depts, loadedRange, onExpandRange, onFetchLogsByRange, onFetchYoY, onUpdateTarget, currentUser, isLeader, onFetchTargetHistory }) {
  const [filter, setFilter]  = usePersistedState('summary.filter',   { dateFrom:'', dateTo:'', dept:'', userId:'', projectNo:'', projectNoMode:'', location:'' });
  const [sortMode, setSortMode] = usePersistedState('summary.sortMode','hours_desc');
  const [csvMode, setCsvMode]  = usePersistedState('summary.csvMode', 'basic');
  const [editTarget, setEditTarget] = useState(null); // { userId, projectNo, value, reason }
  const [savingTarget, setSavingTarget] = useState(false);
  const [historyModal, setHistoryModal] = useState(null); // { userId, projectNo, userName, entries, loading }

  // ---------- 会計年度（期）選択 ----------
  // 現在の期を初期値にする
  const currentFy   = getFiscalYear(today());
  const currentHalf = getFiscalHalf(today());
  const [fyMode, setFyMode]   = usePersistedState('summary.fyMode', 'custom'); // 'custom' | 'half' | 'full'
  const [fySel,  setFySel]    = usePersistedState('summary.fySel',  { fy: currentFy, half: currentHalf });
  const [yoyData, setYoyData] = useState(null); // { current, previous }
  const [yoyLoading, setYoyLoading] = useState(false);

  // 期選択が変わったらフィルターの dateFrom/dateTo を計算、必要なら過去ログをロード
  const applyFiscalSelection = async (mode, sel) => {
    if (mode === 'custom') return;
    const [from, to] = mode === 'half'
      ? fiscalHalfRange(sel.fy, sel.half)
      : fiscalYearRange(sel.fy);
    setFilter(prev => ({ ...prev, dateFrom: from, dateTo: to }));
    // 読み込み済み範囲より過去に遡る場合はサーバーから取り直す
    if (loadedRange && from < loadedRange.from && onExpandRange) {
      // loadedRange.from 〜 from の差分月数ぶん広げる
      const [ly, lm] = loadedRange.from.split('-').map(Number);
      const [fy2, fm] = from.split('-').map(Number);
      const diffMonths = (ly - fy2) * 12 + (lm - fm);
      if (diffMonths > 0) await onExpandRange(diffMonths);
    }
  };

  // 前年同期比較を取得
  const loadYoY = async (from, to) => {
    if (!from || !to || !onFetchYoY) return;
    setYoyLoading(true);
    const data = await onFetchYoY(from, to);
    setYoyData(data);
    setYoyLoading(false);
  };

  const startEditTarget = (userId, projectNo, current) => setEditTarget({ userId, projectNo, value: current ? String(current) : '', reason: '' });
  const cancelEditTarget = () => setEditTarget(null);
  const saveTargetEdit = async () => {
    if (!editTarget) return;
    const v = Number(editTarget.value);
    if (!(v > 0)) { alert('0より大きい値を入力してください'); return; }
    // 既存目標の変更には理由が必須
    const isUpdate = !!findTarget(targets, editTarget.userId, editTarget.projectNo);
    if (isUpdate && (!editTarget.reason || !editTarget.reason.trim())) {
      alert('目標時間を変更する理由を入力してください');
      return;
    }
    setSavingTarget(true);
    const ok = await onUpdateTarget(editTarget.userId, editTarget.projectNo, v, (editTarget.reason || '').trim());
    if (ok) setEditTarget(null);
    setSavingTarget(false);
  };

  const openHistory = async (userId, projectNo, userName) => {
    setHistoryModal({ userId, projectNo, userName, entries: null, loading: true });
    const entries = await onFetchTargetHistory(userId, projectNo);
    setHistoryModal(h => h ? { ...h, entries: entries || [], loading: false } : null);
  };
  const closeHistory = () => setHistoryModal(null);

  const ff = p => setFilter(prev => ({ ...prev, ...p }));
  const deptUsers = filter.dept ? users.filter(u=>u.department===filter.dept) : users;

  const filteredLogs = useMemo(() => {
    return logs.filter(l => {
      if (filter.dateFrom && l.date < filter.dateFrom) return false;
      if (filter.dateTo   && l.date > filter.dateTo)   return false;
      if (filter.userId   && l.userId !== Number(filter.userId)) return false;
      if (filter.dept) {
        // 記録時点の所属部署で絞り込む（異動後も過去の記録は元部署に属する）
        const recDept = l.department || users.find(u=>u.id===l.userId)?.department;
        if (recDept !== filter.dept) return false;
      }
      if (filter.projectNoMode === 'none') {
        if (l.projectNo) return false; // 注番なしのみ
      } else if (filter.projectNoMode === 'has') {
        if (!l.projectNo) return false; // 注番ありのみ
      }
      if (filter.projectNo && filter.projectNoMode !== 'none') {
        const q = filter.projectNo.toLowerCase();
        if (!(l.projectNo || '').toLowerCase().includes(q)) return false;
      }
      if (filter.location && l.location !== filter.location) return false;
      return true;
    });
  }, [logs, filter, users]);

  const summaryData = useMemo(() => {
    const map = {};
    filteredLogs.forEach(l => {
      const key = l.projectNo || '__NO_PROJECT__';
      if (!map[key]) map[key] = { no: l.projectNo, total: 0, users: {} };
      map[key].total += Number(l.hours||0);
      if (!map[key].users[l.userId]) map[key].users[l.userId] = 0;
      map[key].users[l.userId] += Number(l.hours||0);
    });
    const arr = Object.values(map).map(p => {
      const userEntries = Object.entries(p.users).map(([uid,h]) => ({ uid:Number(uid), h })).sort((a,b)=>b.h-a.h);
      const totalTarget = p.no ? userEntries.reduce((s,u)=>s+(findTarget(targets,u.uid,p.no)?.targetHours||0), 0) : 0;
      return { ...p, userEntries, totalTarget };
    });
    const noStr = (p) => p.no || '\uffff'; // 注番なしは末尾
    if (sortMode==='hours_desc') arr.sort((a,b)=>b.total-a.total);
    else if (sortMode==='hours_asc') arr.sort((a,b)=>a.total-b.total);
    else if (sortMode==='no_asc') arr.sort((a,b)=>noStr(a).localeCompare(noStr(b)));
    else if (sortMode==='no_desc') arr.sort((a,b)=>noStr(b).localeCompare(noStr(a)));
    return arr;
  }, [filteredLogs, users, targets, sortMode]);

  const totalH     = summaryData.reduce((s,d)=>s+d.total, 0);
  const totalTgt   = summaryData.reduce((s,d)=>s+d.totalTarget, 0);
  const totalAfter = filteredLogs.filter(l=>l.afterShipment).reduce((s,l)=>s+Number(l.hours||0), 0);
  const totalOut   = filteredLogs.filter(l=>l.location==='社外').reduce((s,l)=>s+Number(l.hours||0), 0);

  const exportCSV = () => {
    let csv = '', fname = '';
    const NP = '(注番なし)';
    if (csvMode==='basic') {
      csv = '注番,客先,件名,合計時間(h)\n';
      summaryData.forEach(s => {
        const p = s.no ? (projects.find(p=>p.no===s.no)||{}) : {};
        const noLabel = s.no || NP;
        csv += `"${noLabel}","${p.client||''}","${p.subject||''}",${s.total.toFixed(1)}\n`;
      });
      fname = `作業集計_基本_${today()}.csv`;
    } else if (csvMode==='monthly') {
      csv = '対象月,注番,客先,件名,合計時間(h)\n';
      const map = {};
      filteredLogs.forEach(l => {
        const m = ym(l.date);
        const pno = l.projectNo || '__NO_PROJECT__';
        const k = `${m}__${pno}`;
        if (!map[k]) {
          const p = l.projectNo ? (projects.find(p=>p.no===l.projectNo)||{}) : {};
          map[k] = { m, no:l.projectNo, client:p.client||'', subject:p.subject||'', h:0 };
        }
        map[k].h += Number(l.hours||0);
      });
      const noKey = r => r.no || '\uffff';
      Object.values(map).sort((a,b)=>a.m.localeCompare(b.m)||noKey(a).localeCompare(noKey(b))).forEach(r => {
        const noLabel = r.no || NP;
        csv += `"${ymJP(r.m)}","${noLabel}","${r.client}","${r.subject}",${r.h.toFixed(1)}\n`;
      });
      fname = `作業集計_月別_${today()}.csv`;
    } else if (csvMode==='target') {
      csv = '担当者,部署,注番,客先,件名,目標時間(h),実作業時間(h),差(h),達成率(%)\n';
      // (担当者 × 注番) 単位
      const map = {};
      filteredLogs.forEach(l => {
        const pno = l.projectNo || '__NO_PROJECT__';
        const k = `${l.userId}__${pno}`;
        if (!map[k]) {
          const u = users.find(u=>u.id===l.userId)||{};
          const p = l.projectNo ? (projects.find(p=>p.no===l.projectNo)||{}) : {};
          const t = l.projectNo ? findTarget(targets, l.userId, l.projectNo) : null;
          // 部署は記録時点の所属（l.department）を優先し、無ければ現在の所属にフォールバック
          map[k] = { name:u.name||'不明', dept:(l.department || u.department || ''), no:l.projectNo, client:p.client||'', subject:p.subject||'', target:t?Number(t.targetHours):0, actual:0 };
        }
        map[k].actual += Number(l.hours||0);
      });
      const noKey = r => r.no || '\uffff';
      Object.values(map).sort((a,b)=>noKey(a).localeCompare(noKey(b))||a.name.localeCompare(b.name)).forEach(r => {
        const diff = (r.actual - r.target).toFixed(1);
        const rate = r.target>0 ? (r.actual/r.target*100).toFixed(1) : '';
        const noLabel = r.no || NP;
        csv += `"${r.name}","${r.dept}","${noLabel}","${r.client}","${r.subject}",${r.target.toFixed(1)},${r.actual.toFixed(1)},${diff},${rate}\n`;
      });
      fname = `作業集計_目標対比_${today()}.csv`;
    } else {
      csv = '作業日,担当者,部署,注番,客先,件名,作業内容,時間(h),場所,出荷後対応,内容詳細\n';
      filteredLogs.forEach(l => {
        const u = users.find(u=>u.id===l.userId)||{};
        const p = l.projectNo ? (projects.find(p=>p.no===l.projectNo)||{}) : {};
        const noLabel = l.projectNo || NP;
        // 部署は記録時点の所属（l.department）を優先
        const recDept = l.department || u.department || '';
        csv += `"${l.date}","${u.name||''}","${recDept}","${noLabel}","${p.client||''}","${p.subject||''}","${l.content}",${Number(l.hours||0).toFixed(1)},"${l.location}","${l.afterShipment?'該当':''}","${(l.details||'').replace(/"/g,'""')}"\n`;
      });
      fname = `作業集計_明細_${today()}.csv`;
    }
    downloadCSV(csv, fname);
  };

  const COLORS = ['bg-blue-500','bg-violet-500','bg-emerald-500','bg-amber-500','bg-rose-500','bg-cyan-500','bg-pink-500','bg-lime-500'];

  // 期選択の候補（過去 5 期 + 次期）
  const fyOptions = useMemo(() => {
    const arr = [];
    for (let i = currentFy + 1; i >= currentFy - 5; i--) arr.push(i);
    return arr;
  }, [currentFy]);

  return (
    <div className="space-y-4">
      {/* 会計年度（期）選択バー */}
      <div className="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl border border-blue-200 p-4 shadow-sm">
        <div className="flex flex-wrap items-center gap-3">
          <div className="flex items-center gap-2">
            <span className="text-xs font-black text-blue-900">会計年度（期）</span>
            <span className="text-[10px] text-slate-500">9月〜翌8月</span>
          </div>
          <div className="flex items-center gap-1 bg-white rounded-lg p-1 border border-blue-200">
            {[
              { id: 'custom', label: '手動' },
              { id: 'half',   label: '半期' },
              { id: 'full',   label: '通年' },
            ].map(({id,label}) => (
              <button key={id} onClick={() => { setFyMode(id); applyFiscalSelection(id, fySel); }}
                className={`text-[11px] font-black px-3 py-1.5 rounded-md transition-colors ${fyMode===id ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-slate-100'}`}>
                {label}
              </button>
            ))}
          </div>
          {fyMode !== 'custom' && (
            <>
              <select value={fySel.fy}
                onChange={e=>{ const sel={...fySel, fy:Number(e.target.value)}; setFySel(sel); applyFiscalSelection(fyMode, sel); }}
                className="border rounded-lg px-2 py-1.5 text-xs font-bold outline-none focus:border-blue-400">
                {fyOptions.map(fy => <option key={fy} value={fy}>{fy}期</option>)}
              </select>
              {fyMode === 'half' && (
                <div className="flex items-center gap-1 bg-white rounded-lg p-1 border border-blue-200">
                  {[
                    { id: 'H1', label: '前期(9-2月)' },
                    { id: 'H2', label: '後期(3-8月)' },
                  ].map(({id,label}) => (
                    <button key={id} onClick={()=>{ const sel={...fySel, half:id}; setFySel(sel); applyFiscalSelection('half', sel); }}
                      className={`text-[10px] font-black px-2 py-1 rounded-md transition-colors ${fySel.half===id ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:bg-slate-100'}`}>
                      {label}
                    </button>
                  ))}
                </div>
              )}
              <div className="text-xs font-black text-indigo-800 bg-white rounded-full px-3 py-1 border border-indigo-200">
                {fyMode === 'half'
                  ? `${fySel.fy}期${fySel.half==='H1'?'前期':'後期'}`
                  : `${fySel.fy}期 通年`}
              </div>
            </>
          )}
          <button
            onClick={()=>loadYoY(filter.dateFrom, filter.dateTo)}
            disabled={!filter.dateFrom || !filter.dateTo || yoyLoading}
            className="ml-auto text-xs font-black bg-indigo-600 text-white hover:bg-indigo-700 disabled:opacity-50 px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors">
            {yoyLoading ? <IRefresh s={12} c="animate-spin"/> : <IChart s={12}/>}
            前年同期比較
          </button>
        </div>
        {fyMode === 'custom' && (
          <p className="text-[10px] text-slate-500 mt-2">※ 手動モードでは下のフィルターの「期間」を使います</p>
        )}
      </div>

      {/* 前年同期比較パネル */}
      {yoyData && (() => {
        // サーバーは byDept を [{dept, hours}, ...] の配列で返す
        const curDeptMap  = Object.fromEntries((yoyData.current?.byDept  || []).map(r => [r.dept, Number(r.hours||0)]));
        const prevDeptMap = Object.fromEntries((yoyData.previous?.byDept || []).map(r => [r.dept, Number(r.hours||0)]));
        const deptNames   = Array.from(new Set([...Object.keys(curDeptMap), ...Object.keys(prevDeptMap)])).sort();
        const curRange  = yoyData.current?.range  || {};
        const prevRange = yoyData.previous?.range || {};
        return (
          <div className="bg-white rounded-xl border border-indigo-200 p-5 shadow-sm">
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2 flex-wrap">
                <IChart s={18} c="text-indigo-600"/>
                <h3 className="text-sm font-black text-slate-700">前年同期比較</h3>
                <span className="text-[10px] text-slate-400">
                  今期: {curRange.from || '-'} 〜 {curRange.to || '-'} ／
                  前期: {prevRange.from || '-'} 〜 {prevRange.to || '-'}
                </span>
              </div>
              <button onClick={()=>setYoyData(null)} className="text-slate-400 hover:text-slate-700"><IX s={14}/></button>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {[
                { key:'totalHours',   label:'総作業時間', fmt:v=>`${Number(v||0).toFixed(1)}h` },
                { key:'logCount',     label:'登録件数',   fmt:v=>`${Number(v||0)}件` },
                { key:'projectCount', label:'注番数',     fmt:v=>`${Number(v||0)}件` },
                { key:'afterHours',   label:'出荷後対応', fmt:v=>`${Number(v||0).toFixed(1)}h` },
              ].map(({key,label,fmt}) => {
                const cur  = Number(yoyData.current?.[key]  || 0);
                const prev = Number(yoyData.previous?.[key] || 0);
                const diff = cur - prev;
                const rate = prev > 0 ? (diff / prev * 100) : (cur > 0 ? 100 : 0);
                const up = diff > 0;
                return (
                  <div key={key} className="bg-slate-50 rounded-lg p-3 border border-slate-200">
                    <div className="text-[10px] font-bold text-slate-500 mb-1">{label}</div>
                    <div className="text-lg font-black text-slate-800">{fmt(cur)}</div>
                    <div className="text-[10px] text-slate-400 mt-0.5">前年: {fmt(prev)}</div>
                    <div className={`text-[10px] font-black mt-1 ${up ? 'text-emerald-600' : diff < 0 ? 'text-rose-600' : 'text-slate-400'}`}>
                      {up ? '▲' : diff < 0 ? '▼' : '—'} {diff === 0 ? '±0' : (up ? '+' : '') + diff.toFixed(1)}
                      {prev > 0 && <span className="ml-1">({(up?'+':'')}{rate.toFixed(1)}%)</span>}
                    </div>
                  </div>
                );
              })}
            </div>
            {deptNames.length > 0 && (
              <div className="mt-4 border-t border-slate-100 pt-3">
                <div className="text-[10px] font-bold text-slate-500 mb-2">部署別 前年比</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                  {deptNames.map(dept => {
                    const cur  = curDeptMap[dept]  || 0;
                    const prev = prevDeptMap[dept] || 0;
                    const diff = cur - prev;
                    const up = diff > 0;
                    return (
                      <div key={dept} className="flex items-center justify-between gap-2 text-[11px] bg-slate-50 rounded-md px-2 py-1 border border-slate-100">
                        <span className={`font-bold px-1.5 py-0.5 rounded whitespace-nowrap ${getDeptColor(dept)}`}>{dept}</span>
                        <span className="font-black text-slate-700 ml-auto">{cur.toFixed(1)}h</span>
                        <span className="text-[10px] text-slate-400">前年 {prev.toFixed(1)}h</span>
                        <span className={`text-[10px] font-black ${up ? 'text-emerald-600' : diff < 0 ? 'text-rose-600' : 'text-slate-400'}`}>
                          {up ? '▲' : diff < 0 ? '▼' : '—'}{diff === 0 ? '±0' : (up ? '+' : '') + diff.toFixed(1)}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {/* フィルターバー */}
      <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
        <div className="flex flex-wrap gap-3 items-end">
          <ISearch s={16} c="text-slate-400 mt-1"/>
          <div className="flex items-center gap-1.5">
            <input type="date" value={filter.dateFrom} onChange={e=>ff({ dateFrom:e.target.value })} className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400"/>
            <span className="text-slate-400 text-xs">〜</span>
            <input type="date" value={filter.dateTo} onChange={e=>ff({ dateTo:e.target.value })} className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400"/>
          </div>
          <select value={filter.dept} onChange={e=>ff({ dept:e.target.value, userId:'' })} className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400">
            <option value="">全部署</option>
            {depts.map(d=><option key={d} value={d}>{d}</option>)}
          </select>
          <select value={filter.userId} onChange={e=>ff({ userId:e.target.value })} className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400">
            <option value="">全担当者</option>
            {deptUsers.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
          <select value={filter.projectNoMode || ''} onChange={e=>ff({ projectNoMode:e.target.value, projectNo: e.target.value==='none' ? '' : filter.projectNo })}
            className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400">
            <option value="">注番すべて</option>
            <option value="has">注番ありのみ</option>
            <option value="none">注番なしのみ</option>
          </select>
          <input type="text" value={filter.projectNo} onChange={e=>ff({ projectNo:e.target.value })}
            list="summary-projects-datalist" placeholder="注番（部分一致）"
            disabled={filter.projectNoMode==='none'}
            className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400 w-36 disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed"/>
          <datalist id="summary-projects-datalist">
            {projects.map(p=><option key={p.no} value={p.no}>{p.client} / {p.subject}</option>)}
          </datalist>
          <select value={filter.location || ''} onChange={e=>ff({ location:e.target.value })}
            className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400">
            <option value="">場所すべて</option>
            <option value="社内">社内のみ</option>
            <option value="社外">社外のみ</option>
          </select>
          <button onClick={()=>{ setFilter({ dateFrom:'', dateTo:'', dept:'', userId:'', projectNo:'', projectNoMode:'', location:'' }); clearPref('summary.filter'); }} className="text-xs text-slate-500 hover:text-slate-700 border rounded-lg px-2 py-1.5 transition-colors">リセット</button>
          <div className="ml-auto flex items-center gap-2">
            <label className="text-xs font-bold text-slate-500">並び替え：</label>
            <select value={sortMode} onChange={e=>setSortMode(e.target.value)} className="border rounded-lg px-2 py-1.5 text-xs outline-none focus:border-blue-400">
              <option value="hours_desc">合計時間（多い順）</option>
              <option value="hours_asc">合計時間（少ない順）</option>
              <option value="no_asc">注番（A-Z）</option>
              <option value="no_desc">注番（Z-A）</option>
            </select>
          </div>
        </div>
      </div>

      {/* サマリーカード */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {[
          { label:'総作業時間', val:`${totalH.toFixed(1)}h`,   color:'text-blue-900',    bg:'bg-blue-50' },
          { label:'総目標時間', val:`${totalTgt.toFixed(1)}h`, color:'text-emerald-800', bg:'bg-emerald-50' },
          { label:'出荷後対応', val:`${totalAfter.toFixed(1)}h`, color:'text-red-700',   bg:'bg-red-50' },
          { label:'社外作業',   val:`${totalOut.toFixed(1)}h`,   color:'text-amber-700', bg:'bg-amber-50' },
        ].map(({ label, val, color, bg }) => (
          <div key={label} className={`${bg} rounded-xl p-4 border border-white`}>
            <div className="text-xs font-bold text-slate-500 mb-1">{label}</div>
            <div className={`text-2xl font-black ${color}`}>{val}</div>
          </div>
        ))}
      </div>

      {/* CSV出力 */}
      <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm flex flex-wrap items-center gap-4">
        <IDl s={18} c="text-slate-500"/>
        <span className="text-xs font-black text-slate-600">CSV出力：</span>
        {[
          { id:'basic',   label:'基本（注番・客先・合計）' },
          { id:'monthly', label:'月ごとにまとめる' },
          { id:'target',  label:'目標vs実績（担当者×注番）' },
          { id:'detail',  label:'明細を出力' },
        ].map(({ id, label }) => (
          <label key={id} className="flex items-center gap-1.5 cursor-pointer text-xs font-bold text-slate-600">
            <input type="radio" name="csvMode" value={id} checked={csvMode===id} onChange={()=>setCsvMode(id)} className="accent-blue-600"/>
            {label}
          </label>
        ))}
        <button onClick={exportCSV} className="ml-auto bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-700 flex items-center gap-1.5 transition-colors">
          <IDl s={14}/> ダウンロード
        </button>
      </div>

      {/* 注番別カード */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {summaryData.map((s) => {
          const p = s.no ? (projects.find(p=>p.no===s.no)||{}) : {};
          const noProject = !s.no;
          return (
            <div key={s.no || '__noproj__'} className={`rounded-xl border shadow-sm hover:shadow-md transition-shadow p-5 ${noProject ? 'bg-amber-50 border-amber-200' : 'bg-white border-slate-200'}`}>
              <div className={`flex justify-between items-start border-b pb-3 mb-4 ${noProject ? 'border-amber-200' : 'border-slate-100'}`}>
                <div className="max-w-[70%]">
                  {noProject ? (
                    <div className="text-base font-black text-amber-700 flex items-center gap-1.5">
                      <IEdit s={14}/> 注番なしの作業
                    </div>
                  ) : (
                    <>
                      <div className="text-base font-black text-blue-800">{s.no}</div>
                      <div className="text-xs text-slate-500 mt-0.5 truncate">{p.client} {p.subject && `/ ${p.subject}`}</div>
                    </>
                  )}
                </div>
                <div className="text-right">
                  <div className="text-xl font-black text-slate-900">{s.total.toFixed(1)}<span className="text-xs font-bold text-slate-400 ml-0.5">h</span></div>
                  {s.totalTarget > 0 && (
                    <div className="text-[10px] font-bold text-emerald-600">目標 {s.totalTarget.toFixed(1)}h</div>
                  )}
                </div>
              </div>
              <div className="space-y-3">
                {s.userEntries.map(({uid, h}, i) => {
                  const user   = users.find(u=>u.id===uid);
                  const name   = user?.name || '不明';
                  const target = s.no ? findTarget(targets, uid, s.no)?.targetHours : null;
                  const diff   = target ? (h - target) : null;
                  const rate   = target ? (h/target*100) : null;
                  const isEditingT = editTarget && editTarget.userId === uid && editTarget.projectNo === s.no;
                  return (
                    <div key={uid}>
                      <div className="flex justify-between text-xs font-bold text-slate-600 mb-1">
                        <span>{name}</span>
                        <span className="flex items-center gap-2">
                          {noProject ? (
                            <span className="text-[10px] text-amber-600">目標対象外</span>
                          ) : isEditingT ? (
                            <span className="flex items-center gap-1">
                              <input type="number" step="0.5" min="0.5" value={editTarget.value}
                                onChange={e=>setEditTarget(t=>({...t,value:e.target.value}))}
                                className="w-16 border border-emerald-300 rounded px-1.5 py-0.5 text-[10px] outline-none focus:border-emerald-500"/>
                              <button onClick={saveTargetEdit} disabled={savingTarget} className="text-emerald-700 hover:bg-emerald-50 rounded px-1"><ICheck s={12}/></button>
                              <button onClick={cancelEditTarget} className="text-slate-400 hover:bg-slate-100 rounded px-1"><IX s={12}/></button>
                            </span>
                          ) : isLeader ? (
                            <span className="flex items-center gap-1">
                              <button type="button" onClick={()=>startEditTarget(uid, s.no, target)}
                                className="text-[10px] text-emerald-600 hover:text-emerald-800 hover:bg-emerald-50 rounded px-1 flex items-center gap-1" title="目標時間を編集">
                                <IEdit s={10}/>
                                {target ? `目標 ${target.toFixed(1)}h` : '目標未設定'}
                              </button>
                              {target && (
                                <button type="button" onClick={()=>openHistory(uid, s.no, name)}
                                  className="text-[10px] text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded px-1" title="変更履歴を見る">
                                  履歴
                                </button>
                              )}
                            </span>
                          ) : (
                            <span className="text-[10px] text-slate-500 flex items-center gap-1" title="目標時間の変更はリーダー・管理者のみ">
                              <ILock s={9}/>
                              {target ? `目標 ${target.toFixed(1)}h` : '目標未設定'}
                            </span>
                          )}
                          <span>{h.toFixed(1)}h</span>
                        </span>
                      </div>
                      {isEditingT && findTarget(targets, uid, s.no) && (
                        <div className="mt-1.5 mb-2 bg-emerald-50 border border-emerald-200 rounded-lg p-2 space-y-1">
                          <label className="text-[10px] font-black text-emerald-800">変更理由 *（監査ログに記録されます）</label>
                          <input type="text" value={editTarget.reason || ''}
                            onChange={e=>setEditTarget(t=>({...t,reason:e.target.value}))}
                            placeholder="例：初期見積もりの変更"
                            className="w-full border border-emerald-300 rounded px-2 py-1 text-[11px] outline-none focus:border-emerald-500"/>
                        </div>
                      )}
                      <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div className={`h-full rounded-full bar-fill ${target ? (rate>100?'bg-red-500':'bg-emerald-500') : COLORS[i % COLORS.length]}`}
                             style={{ width:`${target ? Math.min(rate,100).toFixed(1) : (h/s.total*100).toFixed(1)}%` }}/>
                      </div>
                      {target && (
                        <div className="flex justify-end text-[10px] font-bold mt-0.5">
                          <span className={diff>0 ? 'text-red-600' : 'text-emerald-600'}>
                            {diff>0?'+':''}{diff.toFixed(1)}h（達成率 {rate.toFixed(0)}%）
                          </span>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        {summaryData.length === 0 && (
          <div className="md:col-span-2 py-16 text-center font-bold text-slate-300">集計データがありません</div>
        )}
      </div>

      {/* 変更履歴モーダル */}
      {historyModal && (
        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[80vh] flex flex-col">
            <div className="flex items-center justify-between p-5 border-b border-slate-200">
              <div>
                <h3 className="text-base font-black text-slate-800">目標時間 変更履歴</h3>
                <p className="text-xs text-slate-500">{historyModal.userName} ／ 注番 {historyModal.projectNo}</p>
              </div>
              <button onClick={closeHistory} className="text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full w-8 h-8 flex items-center justify-center">
                <IX s={18}/>
              </button>
            </div>
            <div className="p-5 overflow-y-auto flex-1">
              {historyModal.loading ? (
                <div className="py-10 text-center"><IRefresh s={24} c="animate-spin text-blue-600 mx-auto"/></div>
              ) : (historyModal.entries || []).length === 0 ? (
                <p className="text-center text-sm text-slate-400 py-10">履歴がありません</p>
              ) : (
                <div className="space-y-2">
                  {historyModal.entries.map(e => (
                    <div key={e.id} className="border border-slate-200 rounded-xl p-3 text-xs">
                      <div className="flex justify-between items-start mb-1">
                        <div className="font-bold text-slate-700">{e.changedAt}</div>
                        <div className="text-[10px] bg-slate-100 px-2 py-0.5 rounded-full font-bold text-slate-600">{e.changedByName}</div>
                      </div>
                      <div className="font-mono text-sm mt-1">
                        <span className="text-slate-400">{e.oldValue == null ? '— (初回登録)' : `${Number(e.oldValue).toFixed(1)}h`}</span>
                        <span className="mx-2 text-slate-400">→</span>
                        <span className="font-bold text-emerald-700">{Number(e.newValue).toFixed(1)}h</span>
                      </div>
                      <div className="text-[11px] text-slate-600 mt-1">理由: {e.reason}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="p-4 border-t border-slate-200 flex justify-end">
              <button onClick={closeHistory} className="text-xs font-bold border px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-100">閉じる</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== 環境設定画面 =====================
function SettingsScreen({ users, depts, projects, workContents, onSaveUser, onDeleteUser, onSaveWorkContents, onAddDept, onRenameDept, onDeleteDept, onUpdateProject, onResetPin, currentUser }) {
  const [subTab, setSubTab]     = useState('users');
  const [userForm, setUserForm] = useState({ id:null, name:'', department:depts[0]||'', email:'', role:'member' });
  const [editUserId, setEditUserId] = useState(null);
  const [selectedDept, setSelectedDept] = useState(depts[0]||'');
  const [wItems, setWItems]     = useState(workContents[depts[0]]||[]);
  const [newItem, setNewItem]   = useState('');
  const [newDept, setNewDept]   = useState('');
  const [editDept, setEditDept] = useState(null); // { old, value }
  const [saving, setSaving]     = useState(false);
  const [confirm, setConfirm]   = useState(null); // { type:'user'|'dept', id/name }
  const [projFilter, setProjFilter]   = useState('');
  const [projShowClosed, setProjShowClosed] = useState(false);
  const [editProj, setEditProj] = useState(null); // { no, client, subject, isClosed }
  const pf = p => setEditProj(prev => ({ ...prev, ...p }));

  // 登録済みユーザー一覧のグループ絞り込み（永続化して再マウント時も保持）
  const [userListDeptFilter, setUserListDeptFilter] = usePersistedState('settings.userListDeptFilter', '');
  const filteredUsers = useMemo(() => {
    if (!userListDeptFilter) return users;
    return users.filter(u => u.department === userListDeptFilter);
  }, [users, userListDeptFilter]);

  const filteredProjects = useMemo(() => {
    const q = projFilter.toLowerCase().trim();
    return (projects || []).filter(p => {
      if (!projShowClosed && p.isClosed) return false;
      if (!q) return true;
      return p.no.toLowerCase().includes(q) || (p.client||'').toLowerCase().includes(q) || (p.subject||'').toLowerCase().includes(q);
    });
  }, [projects, projFilter, projShowClosed]);

  const startEditProj = (p) => setEditProj({ no:p.no, client:p.client||'', subject:p.subject||'', isClosed:!!p.isClosed });
  const cancelEditProj = () => setEditProj(null);
  const saveEditProj = async () => {
    if (!editProj || !editProj.client.trim() || !editProj.subject.trim()) return;
    setSaving(true);
    const ok = await onUpdateProject(editProj.no, { client:editProj.client.trim(), subject:editProj.subject.trim(), isClosed:editProj.isClosed });
    if (ok) setEditProj(null);
    setSaving(false);
  };
  const toggleClosed = async (p) => {
    setSaving(true);
    await onUpdateProject(p.no, { client:p.client, subject:p.subject, isClosed:!p.isClosed });
    setSaving(false);
  };

  // wItems は「ユーザーが部署を切り替えたとき」だけ再読み込みする。
  //   旧実装は workContents も依存配列に入れていたため、30 秒ごとの
  //   バックグラウンド同期（loadData silent）で workContents の参照が
  //   新しくなるたびに発火し、追加途中の項目や削除途中の項目が
  //   サーバー側の状態で上書きされて「元に戻る」バグになっていた。
  //
  //   保存後は handleSaveWorkContents 側で既に親の workContents も
  //   更新されており、こちらの wItems は保存時点の items と同値なので、
  //   追加同期は不要。
  useEffect(() => { setWItems(workContents[selectedDept]||[]); /* eslint-disable-next-line react-hooks/exhaustive-deps */ }, [selectedDept]);
  useEffect(() => { if (!depts.includes(selectedDept) && depts.length) setSelectedDept(depts[0]); }, [depts]);
  useEffect(() => { if (!depts.includes(userForm.department) && depts.length) setUserForm(f=>({...f,department:depts[0]})); }, [depts]);

  const uf = p => setUserForm(prev => ({ ...prev, ...p }));

  const startEditUser = (u) => {
    setEditUserId(u.id);
    setUserForm({ id:u.id, name:u.name, department:u.department, email:u.email||'', role: u.role || 'member' });
  };
  const cancelEditUser = () => { setEditUserId(null); setUserForm({ id:null, name:'', department:depts[0]||'', email:'', role:'member' }); };

  const handleUserSubmit = async (e) => {
    e.preventDefault();
    setSaving(true);
    const ok = await onSaveUser(userForm);
    if (ok) cancelEditUser();
    setSaving(false);
  };

  const handleDeleteUser = async (id) => {
    setSaving(true);
    await onDeleteUser(id);
    setConfirm(null);
    setSaving(false);
  };

  const moveItem = (i, dir) => {
    const arr = [...wItems];
    const j = i + dir;
    if (j < 0 || j >= arr.length) return;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    setWItems(arr);
  };

  const handleSaveContents = async () => {
    setSaving(true);
    await onSaveWorkContents(selectedDept, wItems);
    setSaving(false);
  };

  const handleAddDept = async () => {
    if (!newDept.trim()) return;
    setSaving(true);
    const ok = await onAddDept(newDept.trim());
    if (ok) setNewDept('');
    setSaving(false);
  };

  const handleRenameDept = async () => {
    if (!editDept || !editDept.value.trim() || editDept.old === editDept.value.trim()) { setEditDept(null); return; }
    setSaving(true);
    await onRenameDept(editDept.old, editDept.value.trim());
    setEditDept(null);
    setSaving(false);
  };

  const handleDeleteDept = async (name) => {
    setSaving(true);
    await onDeleteDept(name);
    setConfirm(null);
    setSaving(false);
  };

  return (
    <div className="max-w-5xl mx-auto space-y-4">
      {/* サブタブ */}
      <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div className="flex border-b border-slate-200">
          {[
            { id:'users',    icon:<IUser s={16}/>,   label:'ユーザー管理' },
            { id:'groups',   icon:<IUsers s={16}/>,  label:'グループ管理' },
            { id:'work',     icon:<IList s={16}/>,   label:'作業内容マスタ' },
            { id:'projects', icon:<IFolder s={16}/>, label:'注番管理' },
          ].map(({ id, icon, label }) => (
            <button key={id} onClick={()=>setSubTab(id)}
              className={`flex items-center gap-2 px-6 py-3.5 text-sm font-bold transition-all border-b-2 ${subTab===id ? 'border-blue-600 text-blue-700 bg-blue-50/50' : 'border-transparent text-slate-500 hover:bg-slate-50'}`}>
              {icon}{label}
            </button>
          ))}
        </div>

        <div className="p-6">
          {/* ユーザー管理 */}
          {subTab==='users' && (
            <div className="grid grid-cols-1 md:grid-cols-5 gap-6">
              <div className="md:col-span-2">
                <h3 className="text-sm font-black text-slate-700 mb-4">{editUserId ? 'ユーザーを編集' : '新規ユーザーを登録'}</h3>
                <form onSubmit={handleUserSubmit} className="space-y-3">
                  <div className="space-y-1">
                    <label className="text-xs font-bold text-slate-500">氏名 *</label>
                    <input required value={userForm.name} onChange={e=>uf({ name:e.target.value })} placeholder="山田 太郎"
                      className="w-full border-2 rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400"/>
                  </div>
                  <div className="space-y-1">
                    <label className="text-xs font-bold text-slate-500">部署 *</label>
                    <select required value={userForm.department} onChange={e=>uf({ department:e.target.value })}
                      className="w-full border-2 rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400">
                      {depts.map(d=><option key={d} value={d}>{d}</option>)}
                    </select>
                  </div>
                  <div className="space-y-1">
                    <label className="text-xs font-bold text-slate-500">メールアドレス</label>
                    <input type="email" value={userForm.email} onChange={e=>uf({ email:e.target.value })} placeholder="yamada@example.com"
                      className="w-full border-2 rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400"/>
                  </div>
                  <div className="space-y-1">
                    <label className="text-xs font-bold text-slate-500">権限 *</label>
                    <select value={userForm.role} onChange={e=>uf({ role:e.target.value })}
                      className="w-full border-2 rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400">
                      <option value="member">メンバー（作業記録の入力のみ）</option>
                      <option value="leader">リーダー（目標時間の変更可）</option>
                      <option value="admin">管理者（ユーザー・グループ管理・PINリセット可）</option>
                    </select>
                  </div>
                  <div className="flex gap-2 pt-2">
                    <button type="submit" disabled={saving}
                      className="flex-1 bg-blue-600 text-white py-2 rounded-xl text-sm font-bold hover:bg-blue-700 disabled:bg-slate-300 transition-colors flex items-center justify-center gap-1">
                      {saving ? <IRefresh s={14} c="animate-spin"/> : (editUserId ? <ISave s={14}/> : <IPlus s={14}/>)}
                      {editUserId ? '更新' : '登録'}
                    </button>
                    {editUserId && <button type="button" onClick={cancelEditUser} className="border px-3 py-2 rounded-xl text-sm text-slate-500 hover:bg-slate-100">キャンセル</button>}
                  </div>
                </form>
              </div>

              <div className="md:col-span-3">
                <div className="flex items-center justify-between gap-3 mb-4 flex-wrap">
                  <h3 className="text-sm font-black text-slate-700">
                    登録済みユーザー
                    {userListDeptFilter
                      ? <span className="ml-1 font-normal text-slate-500">（{filteredUsers.length}名 / 全{users.length}名）</span>
                      : <span className="ml-1 font-normal text-slate-500">（{users.length}名）</span>}
                  </h3>
                  <div className="flex items-center gap-2">
                    <label className="text-[11px] font-bold text-slate-500">グループ:</label>
                    <select value={userListDeptFilter} onChange={e=>setUserListDeptFilter(e.target.value)}
                      className="border-2 rounded-lg px-2 py-1 text-xs font-bold outline-none focus:border-blue-400">
                      <option value="">すべて</option>
                      {depts.map(d => <option key={d} value={d}>{d}</option>)}
                    </select>
                    {userListDeptFilter && (
                      <button onClick={()=>setUserListDeptFilter('')}
                        className="text-[10px] text-slate-500 hover:text-slate-800 underline"
                        title="フィルター解除">クリア</button>
                    )}
                  </div>
                </div>
                <div className="space-y-2 max-h-96 overflow-y-auto pr-1">
                  {filteredUsers.map(u => (
                    <div key={u.id} className={`flex items-center gap-3 p-3 rounded-xl border transition-all ${editUserId===u.id ? 'border-blue-300 bg-blue-50' : 'border-slate-100 hover:border-slate-200 bg-slate-50'}`}>
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-black ${getDeptColor(u.department)}`}>
                        {u.name.charAt(0)}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-1.5">
                          <span className="font-bold text-sm text-slate-800 truncate">{u.name}</span>
                          <span className={`text-[9px] font-black px-1.5 py-0.5 rounded-full ${ROLE_COLOR[u.role] || ROLE_COLOR.member}`}>{ROLE_LABEL[u.role] || 'メンバー'}</span>
                          {!u.hasPin && <span className="text-[9px] font-black px-1.5 py-0.5 rounded-full bg-amber-100 text-amber-700">PIN未設定</span>}
                        </div>
                        <div className="text-[10px] text-slate-500">{u.department} {u.email && `・${u.email}`}</div>
                      </div>
                      <div className="flex gap-1">
                        <button onClick={()=>startEditUser(u)} className="text-xs border border-blue-200 text-blue-600 hover:bg-blue-50 px-2 py-1 rounded-lg transition-colors">編集</button>
                        {u.hasPin && u.id !== currentUser.id && (
                          <button onClick={()=>{ if (window.confirm(`${u.name} さんの PIN をリセットしますか？\n（次回ログイン時に新しい PIN の設定が必要になります）`)) onResetPin(u.id); }}
                            className="text-xs border border-amber-200 text-amber-600 hover:bg-amber-50 px-2 py-1 rounded-lg transition-colors" title="PINをリセット">PIN</button>
                        )}
                        <button onClick={()=>setConfirm({type:'user',id:u.id})} disabled={u.id === currentUser.id}
                          className="text-xs border border-red-200 text-red-500 hover:bg-red-50 px-2 py-1 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                          title={u.id === currentUser.id ? '自分自身は削除できません' : '削除'}><ITrash s={12}/></button>
                      </div>
                    </div>
                  ))}
                  {users.length===0 && <p className="text-sm text-slate-400 text-center py-8">ユーザーが登録されていません</p>}
                  {users.length>0 && filteredUsers.length===0 && (
                    <p className="text-sm text-slate-400 text-center py-8">
                      「{userListDeptFilter}」に該当するユーザーがいません
                    </p>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* グループ管理 */}
          {subTab==='groups' && (
            <div className="space-y-5">
              <div>
                <h3 className="text-sm font-black text-slate-700 mb-3">新規グループを登録</h3>
                <div className="flex gap-2 max-w-md">
                  <input value={newDept} onChange={e=>setNewDept(e.target.value)}
                    onKeyDown={e=>{ if(e.key==='Enter'){ handleAddDept(); e.preventDefault(); }}}
                    placeholder="例：品質管理グループ"
                    className="flex-1 border-2 rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400"/>
                  <button onClick={handleAddDept} disabled={saving||!newDept.trim()}
                    className="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-700 disabled:bg-slate-300 flex items-center gap-1">
                    <IPlus s={14}/> 追加
                  </button>
                </div>
              </div>

              <div>
                <h3 className="text-sm font-black text-slate-700 mb-3">登録済みグループ（{depts.length}件）</h3>
                <div className="space-y-2">
                  {depts.map(d => {
                    const userCount = users.filter(u=>u.department===d).length;
                    const contentCount = (workContents[d]||[]).length;
                    const isEditing = editDept?.old === d;
                    return (
                      <div key={d} className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100 hover:border-slate-200 transition-all">
                        <div className={`w-3 h-10 rounded-full ${getDeptColor(d).split(' ')[0]}`}></div>
                        <div className="flex-1 min-w-0">
                          {isEditing ? (
                            <div className="flex gap-2">
                              <input value={editDept.value} onChange={e=>setEditDept({...editDept,value:e.target.value})}
                                onKeyDown={e=>{ if(e.key==='Enter'){ handleRenameDept(); }}}
                                className="border-2 rounded-lg px-2 py-1 text-sm outline-none focus:border-blue-400"/>
                              <button onClick={handleRenameDept} className="bg-blue-600 text-white px-2 py-1 rounded text-xs font-bold">保存</button>
                              <button onClick={()=>setEditDept(null)} className="border px-2 py-1 rounded text-xs text-slate-500">中止</button>
                            </div>
                          ) : (
                            <>
                              <div className="font-bold text-sm text-slate-800">{d}</div>
                              <div className="text-[10px] text-slate-500">ユーザー {userCount}名 ・ 作業内容 {contentCount}件</div>
                            </>
                          )}
                        </div>
                        {!isEditing && (
                          <div className="flex gap-1">
                            <button onClick={()=>setEditDept({old:d,value:d})} className="text-xs border border-blue-200 text-blue-600 hover:bg-blue-50 px-2 py-1 rounded-lg">名称変更</button>
                            <button onClick={()=>setConfirm({type:'dept',name:d})} disabled={userCount>0} title={userCount>0?'所属ユーザーがあるため削除できません':''}
                              className="text-xs border border-red-200 text-red-500 hover:bg-red-50 px-2 py-1 rounded-lg disabled:opacity-30 disabled:cursor-not-allowed"><ITrash s={12}/></button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                  {depts.length===0 && <p className="text-sm text-slate-400 text-center py-8">グループが登録されていません</p>}
                </div>
              </div>
            </div>
          )}

          {/* 作業内容マスタ */}
          {subTab==='work' && (
            <div className="space-y-4">
              <div className="flex items-center gap-3 flex-wrap">
                <label className="text-sm font-bold text-slate-600">部署を選択：</label>
                <div className="flex flex-wrap gap-2">
                  {depts.map(d => (
                    <button key={d} onClick={()=>setSelectedDept(d)}
                      className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all border ${selectedDept===d ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200 hover:border-blue-300'}`}>
                      {d}
                    </button>
                  ))}
                </div>
              </div>

              <div className="border border-slate-200 rounded-xl overflow-hidden">
                <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-200 flex items-center justify-between">
                  <span className="text-xs font-black text-slate-600">{selectedDept} の作業内容（{wItems.length}件）</span>
                  <button onClick={handleSaveContents} disabled={saving}
                    className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-700 disabled:bg-slate-300 flex items-center gap-1">
                    {saving ? <IRefresh s={12} c="animate-spin"/> : <ISave s={12}/>} 保存
                  </button>
                </div>
                <div className="divide-y divide-slate-100 max-h-72 overflow-y-auto">
                  {wItems.map((item, i) => (
                    <div key={i} className="flex items-center gap-2 px-4 py-2.5 hover:bg-slate-50">
                      <span className="text-xs font-bold text-slate-400 w-5 text-center">{i+1}</span>
                      <span className="flex-1 text-sm font-bold text-slate-700">{item}</span>
                      <div className="flex gap-1">
                        <button onClick={()=>moveItem(i,-1)} disabled={i===0} className="w-6 h-6 text-slate-400 hover:text-slate-700 disabled:opacity-20 text-xs font-bold">↑</button>
                        <button onClick={()=>moveItem(i,+1)} disabled={i===wItems.length-1} className="w-6 h-6 text-slate-400 hover:text-slate-700 disabled:opacity-20 text-xs font-bold">↓</button>
                        <button onClick={()=>setWItems(prev=>prev.filter((_,j)=>j!==i))} className="w-6 h-6 text-red-400 hover:text-red-600 text-xs"><ITrash s={12}/></button>
                      </div>
                    </div>
                  ))}
                  {wItems.length===0 && <p className="text-xs text-slate-400 text-center py-6">作業内容が登録されていません</p>}
                </div>
                <div className="border-t border-slate-200 px-4 py-3 flex gap-2 bg-slate-50">
                  <input value={newItem} onChange={e=>setNewItem(e.target.value)}
                    onKeyDown={e=>{ if(e.key==='Enter'&&newItem.trim()){ setWItems(prev=>[...prev,newItem.trim()]); setNewItem(''); e.preventDefault(); }}}
                    placeholder="新しい作業内容を入力 (Enter で追加)"
                    className="flex-1 border rounded-lg px-3 py-1.5 text-sm outline-none focus:border-blue-400"/>
                  <button onClick={()=>{ if(newItem.trim()){ setWItems(prev=>[...prev,newItem.trim()]); setNewItem(''); }}}
                    className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-700 flex items-center gap-1">
                    <IPlus s={14}/> 追加
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 注番管理 */}
          {subTab==='projects' && (
            <div className="space-y-4">
              <div className="flex flex-wrap items-center gap-3">
                <div className="flex items-center gap-2 flex-1 min-w-[200px]">
                  <ISearch s={16} c="text-slate-400"/>
                  <input value={projFilter} onChange={e=>setProjFilter(e.target.value)}
                    placeholder="注番・客先・件名で検索"
                    className="flex-1 border-2 rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400"/>
                </div>
                <label className="flex items-center gap-2 text-xs font-bold text-slate-600 cursor-pointer">
                  <input type="checkbox" checked={projShowClosed} onChange={e=>setProjShowClosed(e.target.checked)} className="w-4 h-4"/>
                  完了済みも表示
                </label>
                <div className="ml-auto text-xs font-bold text-slate-400">{filteredProjects.length} 件 / 全 {(projects||[]).length} 件</div>
              </div>

              <div className="border border-slate-200 rounded-xl overflow-hidden">
                <table className="w-full text-sm">
                  <thead className="bg-slate-50 border-b-2 border-slate-200">
                    <tr>
                      <th className="px-4 py-2.5 text-left text-xs font-black text-slate-500 uppercase">注番</th>
                      <th className="px-4 py-2.5 text-left text-xs font-black text-slate-500 uppercase">客先</th>
                      <th className="px-4 py-2.5 text-left text-xs font-black text-slate-500 uppercase">件名</th>
                      <th className="px-4 py-2.5 text-center text-xs font-black text-slate-500 uppercase">状態</th>
                      <th className="px-4 py-2.5 text-right text-xs font-black text-slate-500 uppercase">操作</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {filteredProjects.map(p => {
                      const isEditingP = editProj && editProj.no === p.no;
                      if (isEditingP) return (
                        <tr key={p.no} className="bg-blue-50">
                          <td className="px-4 py-2 font-black text-blue-700">{p.no}</td>
                          <td className="px-4 py-2"><input value={editProj.client} onChange={e=>pf({client:e.target.value})} className="w-full border rounded px-2 py-1 text-xs"/></td>
                          <td className="px-4 py-2"><input value={editProj.subject} onChange={e=>pf({subject:e.target.value})} className="w-full border rounded px-2 py-1 text-xs"/></td>
                          <td className="px-4 py-2 text-center">
                            <label className="inline-flex items-center gap-1 text-xs font-bold text-slate-600">
                              <input type="checkbox" checked={editProj.isClosed} onChange={e=>pf({isClosed:e.target.checked})} className="w-4 h-4"/>
                              完了
                            </label>
                          </td>
                          <td className="px-4 py-2 text-right">
                            <div className="flex gap-1 justify-end">
                              <button onClick={saveEditProj} disabled={saving} className="bg-blue-600 text-white px-2 py-1 rounded text-xs font-bold hover:bg-blue-700 flex items-center gap-1">
                                {saving ? <IRefresh s={12} c="animate-spin"/> : <ICheck s={12}/>} 保存
                              </button>
                              <button onClick={cancelEditProj} className="border px-2 py-1 rounded text-xs text-slate-500 hover:bg-slate-100"><IX s={12}/></button>
                            </div>
                          </td>
                        </tr>
                      );
                      return (
                        <tr key={p.no} className="hover:bg-slate-50">
                          <td className="px-4 py-3 font-black text-blue-700">{p.no}</td>
                          <td className="px-4 py-3 text-slate-700">{p.client}</td>
                          <td className="px-4 py-3 text-slate-600 text-xs">{p.subject}</td>
                          <td className="px-4 py-3 text-center">
                            {p.isClosed
                              ? <span className="inline-flex items-center gap-1 text-[10px] font-black bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full"><ILock s={10}/>完了</span>
                              : <span className="text-[10px] font-black bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">進行中</span>}
                          </td>
                          <td className="px-4 py-3 text-right">
                            <div className="flex gap-1 justify-end">
                              <button onClick={()=>startEditProj(p)} className="text-xs border border-blue-200 text-blue-600 hover:bg-blue-50 px-2 py-1 rounded-lg">編集</button>
                              <button onClick={()=>toggleClosed(p)} disabled={saving}
                                className={`text-xs border px-2 py-1 rounded-lg ${p.isClosed ? 'border-emerald-200 text-emerald-600 hover:bg-emerald-50' : 'border-slate-300 text-slate-500 hover:bg-slate-50'}`}>
                                {p.isClosed ? '再開' : '完了'}
                              </button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                    {filteredProjects.length === 0 && (
                      <tr><td colSpan="5" className="py-12 text-center text-sm font-bold text-slate-300">該当する注番がありません</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* 削除確認モーダル */}
      {confirm && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50" onClick={()=>setConfirm(null)}>
          <div className="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl" onClick={e=>e.stopPropagation()}>
            <h3 className="font-black text-slate-800 mb-2">
              {confirm.type==='user' ? 'ユーザーを削除しますか？' : 'グループを削除しますか？'}
            </h3>
            <p className="text-sm text-slate-500 mb-5">
              {confirm.type==='user'
                ? 'この操作は取り消せません。作業記録は残りますが担当者名が「不明」と表示されます。'
                : '所属ユーザーのいないグループのみ削除可能です。'}
            </p>
            <div className="flex gap-2 justify-end">
              <button onClick={()=>setConfirm(null)} className="border px-4 py-2 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50">キャンセル</button>
              <button onClick={()=>confirm.type==='user' ? handleDeleteUser(confirm.id) : handleDeleteDept(confirm.name)} disabled={saving}
                className="bg-red-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-700 disabled:bg-slate-300 flex items-center gap-1">
                {saving ? <IRefresh s={14} c="animate-spin"/> : <ITrash s={14}/>} 削除
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
